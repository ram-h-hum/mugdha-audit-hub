<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mugdha Art Studio — Daily Store Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#f5f0eb;color:#2d1a0e;min-height:100vh}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#f0e8e0}
  ::-webkit-scrollbar-thumb{background:#b08060;border-radius:3px}
  .btn{cursor:pointer;border:none;border-radius:6px;font-family:'Inter',sans-serif;font-weight:500;transition:all .2s}
  .btn:hover{filter:brightness(0.92)}
  .btn:active{transform:scale(0.98)}
  input,select{font-family:'Inter',sans-serif}
  table{border-collapse:collapse;width:100%}
  th{position:sticky;top:0;z-index:2}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useMemo, useCallback, useRef } = React;
const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

// ── Brand colours ──────────────────────────────────────────────────────────
const C = {
  maroon:'#6B1F1F', maroonD:'#4e1616', maroonL:'#8B3A3A',
  gold:'#C9933A',   goldL:'#e8b96a',   goldD:'#9e7020',
  cream:'#fdf6ee',  creamD:'#f5ede0',  creamDD:'#ede0cf',
  text:'#2d1a0e',   textL:'#6b4c33',   textLL:'#9e7a5a',
  green:'#2d7a3a',  greenBg:'#e8f5ea', greenBd:'#a3d9aa',
  yellow:'#8a6800', yellowBg:'#fff8e1',yellowBd:'#ffd54f',
  red:'#b71c1c',    redBg:'#ffebee',   redBd:'#ef9a9a',
  blue:'#1565c0',   blueBg:'#e3f2fd',  blueBd:'#90caf9',
  purple:'#6a1b9a', purpleBg:'#f3e5f5',
  border:'#ddd0c0', borderL:'#ede4d8',
};

// ── Store master data ───────────────────────────────────────────────────────
const STORES = [
  {code:'TS-MG-KPHB',  name:'KPHB',         city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-BH1',   name:'Banjara Hills M1', city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-BH2',   name:'Banjara Hills M2', city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-NZP',   name:'Nizampet',      city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-MYP',   name:'Miyapur',       city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-KPL',   name:'Kompally',      city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-SCD',   name:'Secunderabad',  city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-LBN',   name:'LB Nagar',      city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-DLK',   name:'Dilsukhnagar',  city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-MEH',   name:'Mehdipatnam',   city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-HIM',   name:'Himayatnagar',  city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-AMP',   name:'Ameerpet',      city:'Hyderabad', state:'TS', region:'City'},
  {code:'TS-MG-MDH',   name:'Madhapur',      city:'Hyderabad', state:'TS', region:'IT Hub'},
  {code:'TS-MG-TNK',   name:'Tarnaka',       city:'Hyderabad', state:'TS', region:'City'},
  {code:'KA-MG-HSR',   name:'HSR Layout',    city:'Bengaluru', state:'KA', region:'Bengaluru'},
  {code:'KA-MG-MAL',   name:'Malleswaram',   city:'Bengaluru', state:'KA', region:'Bengaluru'},
];

const CATS = ['High Pattu','Low Pattu','High Fancy','Low Fancy','Handloom','RDM'];
const AGE_TAGS = [
  {label:'Green (Post Jan 2026)', color:'#2d7a3a', bg:'#e8f5ea'},
  {label:'Yellow (2025)',         color:'#8a6800', bg:'#fff8e1'},
  {label:'Pink (2024)',           color:'#c2185b', bg:'#fce4ec'},
  {label:'Blue (2023)',           color:'#1565c0', bg:'#e3f2fd'},
  {label:'Orange (2022)',         color:'#e65100', bg:'#fff3e0'},
  {label:'White (Pre-2022)',      color:'#5d4037', bg:'#efebe9'},
];

// ── Generate realistic sample data ─────────────────────────────────────────
function seedRand(seed){let s=seed;return()=>{s=(s*16807+0)%2147483647;return(s-1)/2147483646};}

function genDayData(dateStr){
  const r = seedRand(dateStr.split('').reduce((a,c)=>a+c.charCodeAt(0),0));
  return STORES.map(store=>{
    const base = store.code==='TS-MG-KPHB'?18876:Math.floor(3000+r()*12000);
    const catSplit = CATS.map(()=>r());
    const catTotal = catSplit.reduce((a,b)=>a+b,0);
    const catStock = CATS.reduce((o,c,i)=>({...o,[c]:Math.round(base*catSplit[i]/catTotal)}),{});
    const ageSplit = [0.35+r()*0.1, 0.30+r()*0.1, 0.15+r()*0.05, 0.10+r()*0.05, 0.05+r()*0.03, 0.02+r()*0.02];
    const ageTotal = ageSplit.reduce((a,b)=>a+b,0);
    const ageStock = AGE_TAGS.reduce((o,t,i)=>({...o,[t.label]:Math.round(base*ageSplit[i]/ageTotal)}),{});
    const sales    = Math.floor(base*(0.01+r()*0.04));
    const inward   = r()<0.4 ? Math.floor(50+r()*300) : 0;
    const outward  = r()<0.2 ? Math.floor(20+r()*150) : 0;
    const returns_ = Math.floor(r()*8);
    const closing  = base + inward - sales - outward + returns_;
    const avgPrice = store.state==='KA' ? 2800+r()*1200 : 1800+r()*1500;
    const salesVal = Math.round(sales*avgPrice);
    const stockVal = Math.round(closing*avgPrice);
    const damages  = r()<0.15 ? Math.floor(1+r()*5) : 0;
    return {
      code:store.code, name:store.name, city:store.city, state:store.state, region:store.region,
      opening:base, inward, sales, outward, returns:returns_, closing, damages,
      salesValue:salesVal, stockValue:stockVal, avgPrice:Math.round(avgPrice),
      catStock, ageStock,
      salesTrend: Array.from({length:7},(_,i)=>{const rr=seedRand(i*777+(dateStr.charCodeAt(0)||1));return Math.floor(base*(0.01+rr()*0.035));}),
    };
  });
}

// ── Formatters ──────────────────────────────────────────────────────────────
const fmt  = n => typeof n==='number' ? n.toLocaleString('en-IN') : n;
const fmtC = n => typeof n==='number' ? '₹'+Math.round(n/1000).toLocaleString('en-IN')+'K' : n;
const fmtL = n => typeof n==='number' ? '₹'+(n/100000).toFixed(2)+'L' : n;

function today(){const d=new Date();return d.toISOString().split('T')[0];}
function fmtDate(d){const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});}
function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}

// ── KPI Card ────────────────────────────────────────────────────────────────
function KPICard({label,value,sub,icon,color,bg,delta}){
  return (
    <div style={{background:bg||C.cream,border:`1px solid ${C.border}`,borderRadius:10,padding:'16px 20px',minWidth:180,flex:1}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:600,color:C.textL,letterSpacing:.5,textTransform:'uppercase'}}>{label}</span>
        <span style={{fontSize:22}}>{icon}</span>
      </div>
      <div style={{fontSize:28,fontWeight:800,color:color||C.maroon,lineHeight:1}}>{value}</div>
      {sub && <div style={{fontSize:12,color:C.textLL,marginTop:4}}>{sub}</div>}
      {delta!=null && (
        <div style={{fontSize:12,marginTop:4,color:delta>=0?C.green:C.red,fontWeight:600}}>
          {delta>=0?'▲':'▼'} {Math.abs(delta)} pcs vs yesterday
        </div>
      )}
    </div>
  );
}

// ── Badge ───────────────────────────────────────────────────────────────────
function Badge({v}){
  if(v===0) return <span style={{color:C.textLL,fontSize:12}}>—</span>;
  if(v>0) return <span style={{color:C.green,fontWeight:600}}>+{fmt(v)}</span>;
  return <span style={{color:C.red,fontWeight:600}}>{fmt(v)}</span>;
}

// ── Status dot ──────────────────────────────────────────────────────────────
function StatusDot({sales,opening}){
  const pct = sales/opening*100;
  const [color,label] = pct>=3?[C.green,'Good']:pct>=1.5?[C.gold,'Moderate']:[C.red,'Low'];
  return (
    <span title={`Sales ${pct.toFixed(1)}% of stock`} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,fontWeight:600,color}}>
      <span style={{width:8,height:8,borderRadius:'50%',background:color,display:'inline-block'}}/>
      {label}
    </span>
  );
}

// ── Main App ────────────────────────────────────────────────────────────────
function App(){
  const [date,setDate]   = useState(today());
  const [view,setView]   = useState('overview'); // overview | detail | movement | trends
  const [selStore,setSelStore] = useState(null);
  const [sortCol,setSortCol]   = useState('closing');
  const [sortDir,setSortDir]   = useState(-1);
  const [filter,setFilter]     = useState('ALL'); // ALL | TS | KA | City | ...
  const [search,setSearch]     = useState('');
  const [uploadData,setUploadData] = useState(null);
  const fileRef = useRef();

  const rawData = useMemo(()=>genDayData(date),[date]);
  const data    = uploadData || rawData;

  const filtered = useMemo(()=>{
    let d = data;
    if(filter!=='ALL') d = d.filter(s=>s.state===filter||s.region===filter);
    if(search) d = d.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||s.code.toLowerCase().includes(search.toLowerCase()));
    return [...d].sort((a,b)=>sortDir*(a[sortCol]-b[sortCol]));
  },[data,filter,search,sortCol,sortDir]);

  const totals = useMemo(()=>({
    opening:  data.reduce((a,s)=>a+s.opening,0),
    inward:   data.reduce((a,s)=>a+s.inward,0),
    sales:    data.reduce((a,s)=>a+s.sales,0),
    outward:  data.reduce((a,s)=>a+s.outward,0),
    returns:  data.reduce((a,s)=>a+s.returns,0),
    closing:  data.reduce((a,s)=>a+s.closing,0),
    salesVal: data.reduce((a,s)=>a+s.salesValue,0),
    stockVal: data.reduce((a,s)=>a+s.stockValue,0),
    damages:  data.reduce((a,s)=>a+s.damages,0),
    storesWithInward: data.filter(s=>s.inward>0).length,
    storesWithMovement: data.filter(s=>s.outward>0).length,
  }),[data]);

  function sort(col){
    if(sortCol===col) setSortDir(d=>-d);
    else { setSortCol(col); setSortDir(-1); }
  }

  function exportExcel(){
    const rows = [
      ['MUGDHA ART STUDIO LLP — Daily Store Dashboard'],
      ['Date: '+fmtDate(date)],
      [],
      ['Store Code','Store Name','City','State','Opening Stock','Inward','Sales','Outward','Returns','Closing Stock','Damages','Sales Value (₹)','Stock Value (₹)','Avg Price (₹)'],
      ...filtered.map(s=>[s.code,s.name,s.city,s.state,s.opening,s.inward,s.sales,s.outward,s.returns,s.closing,s.damages,s.salesValue,s.stockValue,s.avgPrice]),
      [],
      ['TOTAL','','','',totals.opening,totals.inward,totals.sales,totals.outward,totals.returns,totals.closing,totals.damages,totals.salesVal,totals.stockVal,''],
    ];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:16},{wch:20},{wch:14},{wch:6},{wch:14},{wch:10},{wch:10},{wch:10},{wch:10},{wch:14},{wch:10},{wch:16},{wch:16},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws,'Daily Dashboard');
    // Category sheet
    const catRows=[['Store','...CATS'],...filtered.map(s=>[s.name,...CATS.map(c=>s.catStock[c])])];
    const ws2=XLSX.utils.aoa_to_sheet([['Store',...CATS],...filtered.map(s=>[s.name,...CATS.map(c=>s.catStock[c])])]);
    XLSX.utils.book_append_sheet(wb,ws2,'Category Breakup');
    XLSX.writeFile(wb,`Mugdha_Daily_Dashboard_${date}.xlsx`);
  }

  function handleImport(e){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        // Try to parse standard export format
        const headerRow = rows.findIndex(r=>r[0]==='Store Code');
        if(headerRow>=0){
          const parsed=rows.slice(headerRow+1).filter(r=>r[0]&&r[0]!=='TOTAL').map(r=>({
            code:r[0]||'', name:r[1]||'', city:r[2]||'', state:r[3]||'',
            opening:+r[4]||0, inward:+r[5]||0, sales:+r[6]||0, outward:+r[7]||0,
            returns:+r[8]||0, closing:+r[9]||0, damages:+r[10]||0,
            salesValue:+r[11]||0, stockValue:+r[12]||0, avgPrice:+r[13]||0,
            catStock:{}, ageStock:{}, salesTrend:[],
          }));
          setUploadData(parsed);
          alert(`✅ Loaded ${parsed.length} stores from Excel`);
        } else { alert('⚠️ Unrecognised format. Please use the exported template.'); }
      } catch(err){ alert('❌ Error reading file: '+err.message); }
    };
    reader.readAsBinaryString(file);
  }

  const selData = selStore ? data.find(s=>s.code===selStore) : null;

  // ── Header ────────────────────────────────────────────────────────────────
  const Header = ()=>(
    <div style={{background:`linear-gradient(135deg, ${C.maroon} 0%, ${C.maroonL} 100%)`,padding:'0 24px',boxShadow:'0 2px 12px rgba(0,0,0,0.18)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:64}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div style={{width:42,height:42,borderRadius:8,background:C.gold,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:900,color:C.maroon,boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}}>M</div>
          <div>
            <div style={{color:'#fff',fontWeight:800,fontSize:17,letterSpacing:.3}}>MUGDHA ART STUDIO LLP</div>
            <div style={{color:'rgba(255,255,255,0.7)',fontSize:11,letterSpacing:1.5}}>DAILY STORE OPERATIONS DASHBOARD</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button className="btn" onClick={()=>setDate(d=>addDays(d,-1))} style={{background:'rgba(255,255,255,0.15)',color:'#fff',padding:'6px 12px',fontSize:18}}>‹</button>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} max={today()}
            style={{background:'rgba(255,255,255,0.15)',border:'1px solid rgba(255,255,255,0.3)',color:'#fff',padding:'6px 12px',borderRadius:6,fontSize:13,cursor:'pointer'}}/>
          <button className="btn" onClick={()=>setDate(d=>addDays(d,1))} disabled={date>=today()} style={{background:'rgba(255,255,255,0.15)',color:'#fff',padding:'6px 12px',fontSize:18,opacity:date>=today()?0.4:1}}>›</button>
          <button className="btn" onClick={()=>setDate(today())} style={{background:C.gold,color:C.maroon,padding:'6px 14px',fontSize:12,fontWeight:700}}>TODAY</button>
        </div>
      </div>
      {/* Date display */}
      <div style={{color:'rgba(255,255,255,0.65)',fontSize:12,paddingBottom:8,letterSpacing:.5}}>{fmtDate(date)}</div>
      {/* Nav tabs */}
      <div style={{display:'flex',gap:4,paddingBottom:0}}>
        {[['overview','📊 Overview'],['detail','🏪 Store Detail'],['movement','📦 Movement Log'],['trends','📈 Trends']].map(([v,l])=>(
          <button key={v} className="btn" onClick={()=>setView(v)} style={{
            padding:'8px 18px',fontSize:13,fontWeight:600,borderRadius:'6px 6px 0 0',
            background:view===v?C.cream:'transparent',
            color:view===v?C.maroon:'rgba(255,255,255,0.8)',
          }}>{l}</button>
        ))}
      </div>
    </div>
  );

  // ── KPI Summary ───────────────────────────────────────────────────────────
  const KPISummary = ()=>(
    <div style={{display:'flex',gap:12,flexWrap:'wrap',margin:'20px 24px 0'}}>
      <KPICard label="Total Stock Holding" icon="🏬" value={fmt(totals.closing)} sub={`across ${data.length} stores • ${fmtL(totals.stockVal)}`} color={C.maroon}/>
      <KPICard label="Today's Sales" icon="💰" value={fmt(totals.sales)} sub={fmtL(totals.salesVal)+' revenue'} color={C.green} bg={C.greenBg} delta={totals.sales-Math.floor(totals.sales*1.03)}/>
      <KPICard label="Inward Today" icon="📥" value={fmt(totals.inward)} sub={totals.storesWithInward+' stores received stock'} color={C.blue} bg={C.blueBg}/>
      <KPICard label="Outward Today" icon="📤" value={fmt(totals.outward)} sub={totals.storesWithMovement+' stores dispatched'} color={C.gold}/>
      <KPICard label="Net Movement" icon="⚖️" value={<Badge v={totals.inward-totals.sales-totals.outward+totals.returns}/>} sub="Inward − Sales − Outward + Returns" color={C.maroon}/>
      <KPICard label="Damages" icon="⚠️" value={fmt(totals.damages)} sub="pieces flagged today" color={C.red} bg={C.redBg}/>
    </div>
  );

  // ── Filters bar ───────────────────────────────────────────────────────────
  const FiltersBar = ()=>(
    <div style={{display:'flex',gap:10,alignItems:'center',margin:'16px 24px 0',flexWrap:'wrap'}}>
      <input placeholder="🔍 Search store..." value={search} onChange={e=>setSearch(e.target.value)}
        style={{padding:'7px 12px',border:`1px solid ${C.border}`,borderRadius:6,fontSize:13,width:200,background:C.cream}}/>
      {['ALL','TS','KA','City','IT Hub','Bengaluru'].map(f=>(
        <button key={f} className="btn" onClick={()=>setFilter(f)} style={{
          padding:'6px 14px',fontSize:12,fontWeight:600,
          background:filter===f?C.maroon:C.cream,
          color:filter===f?'#fff':C.textL,
          border:`1px solid ${filter===f?C.maroon:C.border}`,
        }}>{f==='ALL'?'All Stores':f==='TS'?'Telangana':f==='KA'?'Karnataka':f}</button>
      ))}
      <div style={{flex:1}}/>
      <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleImport}/>
      <button className="btn" onClick={()=>fileRef.current.click()} style={{padding:'7px 14px',background:C.blueBg,color:C.blue,border:`1px solid ${C.blueBd}`,fontSize:12,fontWeight:600}}>
        📤 Import ERP Excel
      </button>
      {uploadData && <button className="btn" onClick={()=>setUploadData(null)} style={{padding:'7px 12px',background:C.redBg,color:C.red,border:`1px solid ${C.redBd}`,fontSize:12}}>✕ Clear</button>}
      <button className="btn" onClick={exportExcel} style={{padding:'7px 14px',background:C.maroon,color:'#fff',fontSize:12,fontWeight:600}}>
        ⬇ Export Excel
      </button>
    </div>
  );

  // ── Store Table ───────────────────────────────────────────────────────────
  const TH = ({col,label,title})=>(
    <th onClick={()=>sort(col)} title={title||label} style={{
      background:C.maroon,color:'#fff',padding:'10px 12px',fontSize:11,fontWeight:700,
      letterSpacing:.5,textTransform:'uppercase',cursor:'pointer',whiteSpace:'nowrap',
      userSelect:'none',
    }}>
      {label} {sortCol===col?(sortDir>0?'▲':'▼'):''}
    </th>
  );

  const StoreTable = ()=>(
    <div style={{margin:'16px 24px',borderRadius:10,overflow:'hidden',border:`1px solid ${C.border}`,boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
      <div style={{overflowX:'auto',maxHeight:'calc(100vh - 420px)'}}>
        <table>
          <thead>
            <tr>
              <th style={{background:C.maroon,color:'#fff',padding:'10px 12px',fontSize:11,fontWeight:700,letterSpacing:.5,textAlign:'left',whiteSpace:'nowrap',minWidth:160}}>STORE</th>
              <TH col="opening"    label="Opening"   title="Opening Stock (pieces)"/>
              <TH col="inward"     label="Inward ↓"  title="Stock received today"/>
              <TH col="sales"      label="Sales ↑"   title="Pieces sold today"/>
              <TH col="returns"    label="Returns"   title="Customer returns today"/>
              <TH col="outward"    label="Outward →" title="Stock transferred out"/>
              <TH col="closing"    label="Closing"   title="Closing Stock = Opening + Inward - Sales - Outward + Returns"/>
              <TH col="damages"    label="Damages"   title="Damaged pieces flagged today"/>
              <TH col="salesValue" label="Sale Value" title="Today's sales value (₹)"/>
              <TH col="stockValue" label="Stock Value" title="Estimated holding value (₹)"/>
              <th style={{background:C.maroon,color:'#fff',padding:'10px 12px',fontSize:11,fontWeight:700,letterSpacing:.5,whiteSpace:'nowrap'}}>STATUS</th>
              <th style={{background:C.maroon,color:'#fff',padding:'10px 12px',fontSize:11,fontWeight:700,letterSpacing:.5,whiteSpace:'nowrap'}}>DETAIL</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((s,i)=>{
              const isSelected = selStore===s.code;
              const rowBg = isSelected?'#fff0e0':i%2===0?C.cream:C.creamD;
              return (
                <tr key={s.code} style={{background:rowBg,transition:'background .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#fde8cc'}
                  onMouseLeave={e=>e.currentTarget.style.background=isSelected?'#fff0e0':i%2===0?C.cream:C.creamD}>

  );

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:C.creamD}}>
      <Header/>
      {view==='overview' && <>
        <KPISummary/>
        <FiltersBar/>
        <StoreTable/>
        <ChartsSection/>
      </>}
      {view==='detail'   && <><FiltersBar/><StoreDetail/></>}
      {view==='movement' && <MovementLog/>}
      {view==='trends'   && <TrendsView/>}
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

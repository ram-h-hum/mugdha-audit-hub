const readExcelFile = async (file, sheetName = null) => {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array' });
    const ws = sheetName && wb.SheetNames.includes(sheetName) ? wb.Sheets[sheetName] : wb.Sheets[wb.SheetNames[0]];
    return XLSX.utils.sheet_to_json(ws);
};

const buildIndex = (data, keyField) => {
    const map = new Map();
    (data || []).forEach(row => {
        const key = String(row[keyField] || '').trim().toUpperCase();
        if (key) map.set(key, row);
    });
    return map;
};

function CalendarPicker({ label, value, onChange }) {
    const [open, setOpen] = useState(false);
    const today = new Date();
    const [viewYear, setViewYear] = useState(today.getFullYear());
    const [viewMonth, setViewMonth] = useState(today.getMonth());

    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const firstDay = new Date(viewYear, viewMonth, 1).getDay();

    const selectedDate = value ? new Date(value) : null;

    const handleDay = (day) => {
        const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        onChange(dateStr);
        setOpen(false);
    };

    const prevMonth = () => { if (viewMonth === 0) { setViewMonth(11); setViewYear(y => y-1); } else setViewMonth(m => m-1); };
    const nextMonth = () => { if (viewMonth === 11) { setViewMonth(0); setViewYear(y => y+1); } else setViewMonth(m => m+1); };

    const isSelected = (day) => selectedDate && selectedDate.getFullYear() === viewYear && selectedDate.getMonth() === viewMonth && selectedDate.getDate() === day;
    const isToday = (day) => today.getFullYear() === viewYear && today.getMonth() === viewMonth && today.getDate() === day;

    const cells = Array(firstDay).fill(null).concat(Array.from({length: daysInMonth}, (_, i) => i+1));
    while (cells.length % 7 !== 0) cells.push(null);

    return (
        <div style={{ position: 'relative' }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: COLORS.text, marginBottom: 5 }}>{label}</div>
            <button onClick={() => setOpen(!open)} style={{
                width: '100%', padding: '10px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6,
                background: COLORS.card, cursor: 'pointer', textAlign: 'left', fontSize: 13, color: value ? COLORS.text : COLORS.textMuted,
                display: 'flex', justifyContent: 'space-between', alignItems: 'center'
            }}>
                <span>{value || 'Select date'}</span>
                <span style={{ color: COLORS.primary, fontSize: 16 }}>▼</span>
            </button>
            {open && (
                <div style={{
                    position: 'absolute', top: '100%', left: 0, zIndex: 1000,
                    background: COLORS.card, border: `1px solid ${COLORS.border}`,
                    borderRadius: 8, padding: 12, boxShadow: '0 8px 24px rgba(0,0,0,0.15)',
                    minWidth: 280, marginTop: 4
                }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                        <button onClick={prevMonth} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: COLORS.primary, padding: '0 8px' }}>‹</button>
                        <div style={{ fontWeight: 700, fontSize: 14, color: COLORS.text }}>{MONTHS[viewMonth]} {viewYear}</div>
                        <button onClick={nextMonth} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: COLORS.primary, padding: '0 8px' }}>›</button>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 2 }}>
                        {DAYS.map(d => <div key={d} style={{ textAlign: 'center', fontSize: 10, fontWeight: 700, color: COLORS.textMuted, padding: '4px 0' }}>{d}</div>)}
                        {cells.map((day, idx) => (
                            <div key={idx} onClick={() => day && handleDay(day)} style={{
                                textAlign: 'center', padding: '7px 2px', borderRadius: 6, cursor: day ? 'pointer' : 'default',
                                fontSize: 12, fontWeight: isSelected(day) ? 700 : 400,
                                background: isSelected(day) ? COLORS.primary : isToday(day) ? '#FFF0F5' : 'transparent',
                                color: isSelected(day) ? 'white' : isToday(day) ? COLORS.primary : day ? COLORS.text : 'transparent',
                                border: isToday(day) && !isSelected(day) ? `1px solid ${COLORS.primary}` : '1px solid transparent',
                            }}>{day || ''}</div>
                        ))}
                    </div>
                    <div style={{ marginTop: 10, textAlign: 'center' }}>
                        <button onClick={() => { onChange(''); setOpen(false); }} style={{ fontSize: 11, color: COLORS.textMuted, background: 'none', border: 'none', cursor: 'pointer' }}>Clear date</button>
                    </div>
                </div>
            )}
        </div>
    );
}

            let app;
            if (window.firebase) {
                try { app = firebase.app('mugdha'); }
                catch { app = firebase.initializeApp(fbConfig, 'mugdha'); }
                const db = firebase.database(app);
                setFbDb(db);
                setFbStatus('connecting');
            }
        } catch(err) { setFbStatus('error'); console.error('Firebase init:', err); }
    }, [fbConfig]);

    // Subscribe to session items in real-time (admin watches ALL staff items)
    useEffect(() => {
        if (!fbDb || !sessionCode) { setFbStatus(fbDb ? 'connecting' : 'offline'); return; }
        setFbStatus('connecting');
        const path = `mugdha-audit/sessions/${sessionCode}/items`;
        const ref = fbDb.ref(path);
        fbRef.current = ref;
        const handler = ref.on('value', (snap) => {
            setFbStatus('live');
            const data = snap.val();
            if (!data) return;
            const items = Object.values(data).sort((a,b) => (a.ts||0) - (b.ts||0));
            setScannedItems(items);
        }, (err) => { setFbStatus('error'); console.error('FB listener:', err); });

        // Watch connected staff presence
        const staffRef = fbDb.ref(`mugdha-audit/sessions/${sessionCode}/staff`);
        staffRef.on('value', snap => { const d = snap.val(); if (d) setLiveStaff(d); });

        // Write own presence
        const myPresenceRef = fbDb.ref(`mugdha-audit/sessions/${sessionCode}/staff/${currentUser.id}`);
        myPresenceRef.set({ name: currentUser.name, role: currentUser.role, lastSeen: Date.now(), count: 0 });

        return () => {
            ref.off('value', handler);
            staffRef.off();
            fbRef.current = null;
        };
    }, [fbDb, sessionCode]);

    // Write a single item to Firebase
    const fbWriteItem = (item) => {
        if (!fbDb || !sessionCode) return;
        fbDb.ref(`mugdha-audit/sessions/${sessionCode}/items/${item.id}`).set(item);
        // Update own staff count
        fbDb.ref(`mugdha-audit/sessions/${sessionCode}/staff/${currentUser.id}/count`).transaction(v => (v||0)+1);
        fbDb.ref(`mugdha-audit/sessions/${sessionCode}/staff/${currentUser.id}/lastSeen`).set(Date.now());
    };

    const fbDeleteItem = (itemId) => {
        if (!fbDb || !sessionCode) return;
        fbDb.ref(`mugdha-audit/sessions/${sessionCode}/items/${itemId}`).remove();
    };

    const createSession = () => {
        const outlet = stores.find(s => s.code === selectedOutlet)?.name || selectedOutlet;
        const suffix = Math.random().toString(36).slice(2, 6).toUpperCase();
        const code = selectedOutlet.replace('TS-MG-','').replace('KA-MG-','').replace('AP-MG-','').slice(0,4).toUpperCase() + '-' + suffix;
        setSessionCode(code);
        localStorage.setItem('mugdha_session', code);
        if (fbDb) {
            fbDb.ref(`mugdha-audit/sessions/${code}`).set({
                outlet: selectedOutlet, outletName: outlet,
                createdBy: currentUser.name, createdAt: Date.now(),
                openingStock: parseInt(openingStockErp)||0, active: true,
            });
        }
    };

    const joinSession = () => {
        const code = sessionCodeInput.trim().toUpperCase();
        if (!code) return;
        setSessionCode(code);
        localStorage.setItem('mugdha_session', code);
        setSessionCodeInput('');
        // Pull session info for staff (outlet, openingStock)
        if (fbDb) {
            fbDb.ref(`mugdha-audit/sessions/${code}`).once('value').then(snap => {
                const d = snap.val();
                if (d) { if (d.openingStock) setOpeningStockErp(String(d.openingStock)); if (d.outlet) setSelectedOutlet(d.outlet); }
            });
        }
    };

    const disconnectSession = () => {
        setSessionCode(''); localStorage.removeItem('mugdha_session'); setScannedItems([]); setLiveStaff({}); setFbStatus(fbDb ? 'connecting' : 'offline');
    };

    const fbStatusColor = { offline: COLORS.textMuted, connecting: COLORS.warning, live: COLORS.success, error: COLORS.error }[fbStatus];
    const fbStatusLabel = { offline: '○ Offline', connecting: '◌ Connecting…', live: '● Live', error: '✕ Error' }[fbStatus];

    // Keyboard shortcut: when scanResult is showing, press W/Y/G/O/B/P/R/U to select tag + add instantly
    useEffect(() => {
        const handler = (e) => {
            if (!scanResult) return;
            // Don't fire if user is typing in an input/textarea
            if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) {
                // Allow Escape from input fields to dismiss
                if (e.key === 'Escape') { setScanResult(null); setBarcodeInput(''); setTimeout(() => barcodeInputRef.current?.focus(), 50); }
                return;
            }
            const tag = TAG_KEYS[e.key.toLowerCase()];
            if (tag) {
                e.preventDefault();
                setScanTag(tag);
                const mrpVal = scanMrpOverride ? parseFloat(scanMrpOverride) : scanResult.mrp;
                const newItem = { id: Date.now(), ts: Date.now(), barcode: scanResult.barcode, qty: scanQty, tagType: tag, mrp: mrpVal, cp: scanResult.cp, erpStatus: scanResult.erpStatus, vendorErp: scanResult.vendorErp, rack: scanRack, isManual: false, scannedBy: currentUser?.name || '' };
                if (fbDb && sessionCode) { fbWriteItem(newItem); }
                else { setScannedItems(prev => [...prev, newItem]); }
                setLastAddedLabel(`✓ Added: ${scanResult.barcode} — ${tag} tag`);
                setScanQty(1); setScanRack(''); setScanMrpOverride(''); setScanResult(null); setBarcodeInput('');
                setTimeout(() => { barcodeInputRef.current?.focus(); setLastAddedLabel(''); }, 1200);
            }
            if (e.key === 'Escape') { setScanResult(null); setBarcodeInput(''); setTimeout(() => barcodeInputRef.current?.focus(), 50); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
    }, [scanResult, scanMrpOverride, scanQty, scanRack]);

    const addManualItem = () => {
        if (!manualItem.desc && !manualItem.mrp) { alert('Enter at least a description or MRP.'); return; }
        const newItem = { id: Date.now(), ts: Date.now(), barcode: manualItem.desc || 'MANUAL-ENTRY', qty: parseInt(manualItem.qty)||1, tagType: manualItem.tag, mrp: parseFloat(manualItem.mrp)||0, cp: 0, erpStatus: 'NOT PART OF ERP', vendorErp: manualItem.vendor || '—', rack: manualItem.rack, isManual: true, category: manualItem.category, scannedBy: currentUser?.name || '' };
        if (fbDb && sessionCode) { fbWriteItem(newItem); }
        else { setScannedItems(prev => [...prev, newItem]); }
        setManualItem({ desc: '', qty: 1, mrp: '', tag: 'WHITE', vendor: '', rack: '', category: 'Uncategorized' });
        setLastAddedLabel('✓ Manual item added');
        setTimeout(() => setLastAddedLabel(''), 1200);
    };

    const effectiveConsolidatedData = useMemo(() => {
        if (consolidatedData.length > 0) return consolidatedData;
        return scannedItems.map(item => ({
            BARCODE: item.barcode,
            'PHY QTY': item.qty,
            'TAG TYPE': item.tagType,
            MRP: item.mrp,
            CP: item.cp,
            'ERP STATUS': item.erpStatus,
            'VENDOR DETAILS': item.vendorErp,
        }));
    }, [consolidatedData, scannedItems]);

    const calculations = useMemo(() => {
        const physicalScanned = (effectiveConsolidatedData || []).reduce((sum, row) => sum + (parseInt(row['PHY QTY']) || 0), 0);
        const physicalCount = physicalScanned + (parseInt(nonBarcodeItems) || 0);
        const erpOpening = parseInt(openingStockErp) || 0;
        const stnInQty = (stnInwardData || []).reduce((sum, row) => sum + (parseInt(row.Quantity || row.QTY || row.Qty) || 0), 0);
        const stnOutQty = (stnOutwardData || []).reduce((sum, row) => sum + (parseInt(row.Quantity || row.QTY || row.Qty) || 0), 0);
        const returnsQty = (returnsData || []).length;
        const salesQty = (salesData || []).reduce((sum, row) => sum + (parseInt(row.SoldQuantity) || 1), 0);
        const erpAdjusted = erpOpening + stnInQty - stnOutQty + returnsQty - salesQty;
        const variance = physicalCount - erpAdjusted;
        const variancePercent = erpAdjusted !== 0 ? (variance / erpAdjusted) * 100 : 0;
        const erpMatched = (effectiveConsolidatedData || []).filter(r => r['ERP STATUS'] === 'YES').length;
        const ghostStock = (effectiveConsolidatedData || []).filter(r => r['ERP STATUS'] === 'NOT PART OF ERP').length;
        const matchRate = effectiveConsolidatedData.length > 0 ? (erpMatched / effectiveConsolidatedData.length) * 100 : 0;
        const shrinkagePieces = Math.max(0, erpAdjusted - physicalCount);
        const shrinkageRate = erpAdjusted > 0 ? (shrinkagePieces / erpAdjusted) * 100 : 0;
        const mrvValue = (effectiveConsolidatedData || []).reduce((sum, row) => sum + ((parseInt(row['PHY QTY']) || 0) * (parseFloat(row.MRP) || 0)), 0);
        const cpValue = (effectiveConsolidatedData || []).reduce((sum, row) => sum + ((parseInt(row['PHY QTY']) || 0) * (parseFloat(row.CP) || 0)), 0);

        let riskRating = 'LOW';
        if (shrinkageRate > riskThresholds.high) riskRating = 'CRITICAL';
        else if (shrinkageRate > riskThresholds.medium) riskRating = 'HIGH';
        else if (shrinkageRate > riskThresholds.low) riskRating = 'MEDIUM';

        const tagDistribution = {};
        (effectiveConsolidatedData || []).forEach(row => {
            const tag = row['TAG TYPE'] || 'UNTAGGED';
            if (!tagDistribution[tag]) tagDistribution[tag] = { count: 0, qty: 0, mrvValue: 0 };
            tagDistribution[tag].count += 1;
            tagDistribution[tag].qty += parseInt(row['PHY QTY']) || 0;
            tagDistribution[tag].mrvValue += (parseInt(row['PHY QTY']) || 0) * (parseFloat(row.MRP) || 0);
        });

        const lastClosing = parseInt(lastAuditClosingStock) || 0;
        const expected2 = lastClosing + stnInQty - stnOutQty + returnsQty - salesQty;
        const variance2 = physicalCount - expected2;
        const variancePercent2 = expected2 !== 0 ? (variance2 / expected2) * 100 : 0;

        const categories = {};
        (salesData || []).forEach(row => {
            const cat = row.Category || 'Uncategorized';
            if (!categories[cat]) categories[cat] = { count: 0, qty: 0, value: 0 };
            categories[cat].count += 1;
            categories[cat].qty += parseInt(row.SoldQuantity) || 0;
            categories[cat].value += (parseInt(row.SoldQuantity) || 0) * (parseFloat(row.MRP) || 0);
        });

        return {
            physicalCount, physicalScanned, erpOpening, stnInQty, stnOutQty, returnsQty, salesQty, erpAdjusted,
            variance, variancePercent, erpMatched, ghostStock, matchRate, shrinkagePieces, shrinkageRate,
            mrvValue, cpValue, riskRating, tagDistribution, expected2, variance2, variancePercent2, categories
        };
    }, [effectiveConsolidatedData, nonBarcodeItems, openingStockErp, stnInwardData, stnOutwardData, returnsData, salesData, lastAuditClosingStock, riskThresholds]);

    const addScanItem = () => {
        if (!scanResult) return;
        const mrpVal = scanMrpOverride ? parseFloat(scanMrpOverride) : scanResult.mrp;
        const newItem = { id: Date.now(), ts: Date.now(), barcode: scanResult.barcode, qty: scanQty, tagType: scanTag, mrp: mrpVal, cp: scanResult.cp, erpStatus: scanResult.erpStatus, vendorErp: scanResult.vendorErp, rack: scanRack, isManual: false, scannedBy: currentUser?.name || '' };
        if (fbDb && sessionCode) { fbWriteItem(newItem); }
        else { setScannedItems(prev => [...prev, newItem]); }
        setLastAddedLabel(`✓ Added: ${scanResult.barcode} — ${scanTag} tag`);
        setScanQty(1); setScanTag('WHITE'); setScanRack(''); setScanMrpOverride(''); setScanResult(null); setBarcodeInput('');
        setTimeout(() => { barcodeInputRef.current?.focus(); setLastAddedLabel(''); }, 1200);
    };

    const removeScannedItem = (itemId) => {
        if (fbDb && sessionCode) { fbDeleteItem(itemId); }
        else { setScannedItems(prev => prev.filter(i => i.id !== itemId)); }
    };

    const scanBarcode = (barcode) => {
        if (!barcode.trim()) return;
        const key = barcode.toUpperCase().trim();
        const erpMatch = erpRefIndex.get(key);
        const qrd3Match = qrd3RefIndex.get(key);
        const mrnMatch = focusMrnRefIndex.get(key);

        // Even if not found in any ref, still create a result so staff can log it as ghost stock
        setScanResult({
            barcode: barcode.trim(),
            erpStatus: erpMatch ? 'YES' : 'NOT PART OF ERP',
            mrp: erpMatch?.MRP || qrd3Match?.MRP || mrnMatch?.MRP || 0,
            cp: erpMatch?.['Cost Price'] || erpMatch?.CP || 0,
            erpQty: erpMatch?.Quantity || 0,
            vendorErp: erpMatch?.Vendor || '—',
            vendorMrn: mrnMatch?.['VendorAC.Name'] || '—',
            vendorQrd3: qrd3Match?.['Vendor Name'] || '—',
        });
        setScanMrpOverride('');
    };

    const dataSource = consolidatedData.length > 0 ? 'Uploaded File' : 'Live Scanner';

    const renderDashboard = () => (
        <div style={{ padding: 20 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                <div>
                    <h1 style={{ fontSize: 28, fontWeight: 700, color: COLORS.text, marginBottom: 5 }}>Dashboard</h1>
                    <div style={{ fontSize: 13, color: COLORS.textMuted }}>
                        Outlet: <strong>{stores.find(s => s.code === selectedOutlet)?.name || selectedOutlet}</strong> | Data Source: <strong style={{ color: COLORS.primary }}>{dataSource}</strong>
                    </div>
                </div>
                <select value={selectedOutlet} onChange={(e) => setSelectedOutlet(e.target.value)}
                    style={{ padding: '8px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 14, color: COLORS.text }}>
                    {stores.filter(s => s.active).map(s => <option key={s.code} value={s.code}>{s.name}</option>)}
                </select>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 16, marginBottom: 24 }}>
                {[
                    { label: 'Physical Count', value: formatNumber(calculations.physicalCount), color: COLORS.info },
                    { label: 'ERP Adjusted', value: formatNumber(calculations.erpAdjusted), color: COLORS.primary },
                    { label: 'Variance', value: formatNumber(calculations.variance) + ` (${calculations.variancePercent.toFixed(2)}%)`, color: COLORS.warning },
                    { label: 'Match Rate', value: calculations.matchRate.toFixed(1) + '%', color: COLORS.success },
                    { label: 'Shrinkage', value: calculations.shrinkagePieces + ' units', color: COLORS.error },
                    { label: 'Risk Rating', value: calculations.riskRating, color: calculations.riskRating === 'CRITICAL' ? COLORS.error : calculations.riskRating === 'HIGH' ? COLORS.warning : COLORS.success },
                ].map((metric, idx) => (
                    <div key={idx} style={{
                        background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 16,
                        boxShadow: '0 1px 3px rgba(0,0,0,0.05)'
                    }}>
                        <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600, marginBottom: 8 }}>{metric.label}</div>
                        <div style={{ fontSize: 24, fontWeight: 700, color: metric.color }}>{metric.value}</div>
                    </div>
                ))}
            </div>

            <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 20, marginBottom: 20 }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginBottom: 16 }}>Tag Distribution</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: 12 }}>
                    {Object.entries(calculations.tagDistribution).map(([tag, data]) => (
                        <div key={tag} style={{ background: COLORS.section, borderRadius: 8, padding: 12, border: `2px solid ${TAG_COLORS[tag] || COLORS.border}` }}>
                            <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, marginBottom: 4 }}>{tag}</div>
                            <div style={{ fontSize: 20, fontWeight: 700, color: COLORS.text }}>{data.count}</div>
                            <div style={{ fontSize: 11, color: COLORS.textLight, marginTop: 4 }}>Qty: {data.qty} | Value: {formatCurrency(data.mrvValue)}</div>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );

    const downloadScanData = () => {
        if (scannedItems.length === 0) { alert('No scanned items to download.'); return; }
        const rows = [['S NO','BARCODE','QTY','TAG TYPE','MRP','CP','VENDOR NAME-MRP','ERP STATUS','SCANNED BY','OUTLET']];
        scannedItems.forEach((item, idx) => {
            rows.push([idx+1, item.barcode, item.qty, item.tagType, item.mrp, item.cp, item.vendorErp, item.erpStatus, currentUser?.name || '', stores.find(s => s.code === selectedOutlet)?.name || selectedOutlet]);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'ERP-SCANNING');
        XLSX.writeFile(wb, `Scan_${selectedOutlet}_${currentUser?.name || 'staff'}_${new Date().toISOString().slice(0,10)}.xlsx`);
    };

    const renderScanner = () => {
        const totalScannedPcs = scannedItems.reduce((s,i) => s + i.qty, 0);
        const erpMatched = scannedItems.filter(i => i.erpStatus === 'YES').length;
        const ghostCount = scannedItems.filter(i => i.erpStatus === 'NOT PART OF ERP').length;
        const matchPct = scannedItems.length > 0 ? ((erpMatched / scannedItems.length)*100).toFixed(1) : '0.0';
        const liveVariance = (parseInt(openingStockErp)||0) - totalScannedPcs;
        const liveVariancePct = (parseInt(openingStockErp)||0) > 0 ? ((liveVariance / (parseInt(openingStockErp)||1))*100).toFixed(2) : '0.00';
        const erpLoaded = erpRefData.length > 0;
        const totalMRV = scannedItems.reduce((s,i) => s + (i.qty * (i.mrp||0)), 0);

        return (
        <div style={{ padding: 20, maxWidth: 1100, margin: '0 auto' }}>
            {/* Header */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
                <div>
                    <h1 style={{ fontSize: 26, fontWeight: 800, color: COLORS.text, marginBottom: 4 }}>Live Scanner</h1>
                    <div style={{ fontSize: 12, color: COLORS.textMuted }}>
                        Outlet: <strong>{stores.find(s => s.code === selectedOutlet)?.name || selectedOutlet}</strong>
                        &nbsp;|&nbsp;Operator: <strong style={{ color: COLORS.primary }}>{currentUser?.name}</strong>
                    </div>
                </div>
                <div style={{ display: 'flex', gap: 10 }}>
                    {!isAdmin && (
                        <select value={selectedOutlet} onChange={e => setSelectedOutlet(e.target.value)}
                            style={{ padding: '8px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 13 }}>
                            {stores.filter(s => s.active).map(s => <option key={s.code} value={s.code}>{s.name}</option>)}
                        </select>
                    )}
                    <button onClick={downloadScanData} style={{ padding: '8px 16px', background: COLORS.success, color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 700, fontSize: 13 }}>
                        ⬇ Download Scan Data
                    </button>
                    <button onClick={onLogout} style={{ padding: '8px 14px', background: COLORS.section, color: COLORS.text, border: `1px solid ${COLORS.border}`, borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>
                        Sign Out
                    </button>
                </div>
            </div>

            {/* ─── REAL-TIME SESSION PANEL ─────────────────────────────── */}
            <div style={{ background: COLORS.sidebar, borderRadius: 12, padding: '14px 20px', marginBottom: 16, display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 16 }}>
                {/* Status pill */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ width: 10, height: 10, borderRadius: '50%', background: fbStatusColor, display: 'inline-block', flexShrink: 0 }}></span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: fbStatusColor }}>{fbStatusLabel}</span>
                    {sessionCode && <span style={{ fontSize: 11, color: '#aaa', marginLeft: 6 }}>Session: <strong style={{ color: COLORS.gold, fontFamily: 'monospace', letterSpacing: 1 }}>{sessionCode}</strong></span>}
                </div>

                {/* Admin: create / end session */}
                {isAdmin && !sessionCode && fbDb && (
                    <button onClick={createSession} style={{ padding: '7px 16px', background: COLORS.gold, color: '#000', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 700, fontSize: 12 }}>
                        ⚡ Create Live Session
                    </button>
                )}
                {isAdmin && !fbDb && (
                    <span style={{ fontSize: 11, color: '#888' }}>Configure Firebase in Settings → Live Sync to enable real-time collaboration.</span>
                )}
                {isAdmin && sessionCode && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div style={{ background: 'rgba(201,168,76,0.15)', border: '1px solid rgba(201,168,76,0.35)', borderRadius: 8, padding: '5px 12px' }}>
                            <span style={{ fontSize: 10, color: '#aaa', marginRight: 6 }}>Share code with staff:</span>
                            <strong style={{ color: COLORS.gold, fontFamily: 'monospace', fontSize: 14, letterSpacing: 2 }}>{sessionCode}</strong>
                        </div>
                        <button onClick={disconnectSession} style={{ padding: '6px 12px', background: 'rgba(185,28,28,0.2)', border: '1px solid rgba(185,28,28,0.4)', color: '#f87171', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 11 }}>
                            ✕ End Session
                        </button>
                    </div>
                )}

                {/* Staff: join session */}
                {!isAdmin && !sessionCode && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <input value={sessionCodeInput} onChange={e => setSessionCodeInput(e.target.value.toUpperCase())}
                            onKeyDown={e => e.key === 'Enter' && joinSession()}
                            placeholder="Enter session code (e.g. KPHB-A3B2)"
                            style={{ padding: '7px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, fontFamily: 'monospace', width: 200, background: COLORS.bg }} />
                        <button onClick={joinSession} style={{ padding: '7px 14px', background: COLORS.gold, color: '#000', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 700, fontSize: 12 }}>
                            Join
                        </button>
                    </div>
                )}
                {!isAdmin && sessionCode && (
                    <button onClick={disconnectSession} style={{ padding: '6px 12px', background: 'rgba(185,28,28,0.2)', border: '1px solid rgba(185,28,28,0.4)', color: '#f87171', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 11 }}>
                        ✕ Leave Session
                    </button>
                )}

                {/* Live staff list */}
                {Object.keys(liveStaff).length > 0 && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginLeft: 'auto', flexWrap: 'wrap' }}>
                        <span style={{ fontSize: 10, color: '#888', fontWeight: 600, textTransform: 'uppercase' }}>Online:</span>
                        {Object.entries(liveStaff).map(([uid, s]) => (
                            <div key={uid} style={{ display: 'flex', alignItems: 'center', gap: 5, background: 'rgba(255,255,255,0.07)', borderRadius: 20, padding: '3px 10px' }}>
                                <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#4ade80', display: 'inline-block' }}></span>
                                <span style={{ fontSize: 11, color: 'white' }}>{s.name}</span>
                                <span style={{ fontSize: 10, color: COLORS.gold, fontWeight: 700 }}>{s.count || 0}</span>
                            </div>
                        ))}
                    </div>
                )}
            </div>

            {/* STEP 1 — ERP Upload */}
            <div style={{ background: erpLoaded ? COLORS.successBg : COLORS.card, border: `2px solid ${erpLoaded ? COLORS.success : COLORS.primary}`, borderRadius: 12, padding: 20, marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
                            <div style={{ width: 28, height: 28, borderRadius: '50%', background: erpLoaded ? COLORS.success : COLORS.primary, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 13 }}>1</div>
                            <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.text }}>Upload ERP Stock Reference</div>
                            {erpLoaded && <span style={{ background: COLORS.success, color: 'white', fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 10 }}>✓ LOADED</span>}
                        </div>
                        <div style={{ fontSize: 12, color: COLORS.textMuted, marginLeft: 38 }}>
                            {erpLoaded
                                ? `${erpRefData.length.toLocaleString('en-IN')} items indexed — ready to scan`
                                : 'Upload the ERP-STOCK Excel file before scanning. This is used to auto-fill MRP, CP, and vendor details.'}
                        </div>
                    </div>
                    <label style={{ padding: '10px 20px', background: erpLoaded ? COLORS.success : COLORS.primary, color: 'white', borderRadius: 8, cursor: 'pointer', fontWeight: 700, fontSize: 13, whiteSpace: 'nowrap', flexShrink: 0 }}>
                        {erpLoaded ? '↺ Re-Upload ERP' : '↑ Upload ERP-STOCK Excel'}
                        <input type="file" accept=".xlsx,.xls" style={{ display: 'none' }} onChange={async (e) => {
                            const file = e.target.files[0]; if (!file) return;
                            try {
                                let data = await readExcelFile(file, 'ERP-STOCK');
                                if (!data || data.length === 0) data = await readExcelFile(file);
                                setErpRefData(data);
                                setErpRefIndex(buildIndex(data, 'BARCODE'));
                                // also auto-set opening stock from ERP
                                const total = data.reduce((s,r) => s + (parseInt(r.QTY)||0), 0);
                                if (total > 0 && !openingStockErp) setOpeningStockErp(String(total));
                            } catch(err) { alert('Error reading ERP file: ' + err.message); }
                            e.target.value = '';
                        }} />
                    </label>
                </div>
                {erpLoaded && (
                    <div style={{ marginLeft: 38, marginTop: 10, display: 'flex', gap: 20 }}>
                        <div style={{ fontSize: 12 }}><span style={{ color: COLORS.textMuted }}>Opening Stock:</span> <strong style={{ color: COLORS.text }}>{formatNumber(parseInt(openingStockErp)||0)} pcs</strong></div>
                        <div style={{ fontSize: 12 }}><span style={{ color: COLORS.textMuted }}>Scanned so far:</span> <strong style={{ color: COLORS.primary }}>{formatNumber(totalScannedPcs)} pcs</strong></div>
                    </div>
                )}
            </div>

            {/* STEP 2 — Scan Barcode */}
            <div style={{ background: COLORS.card, border: `2px solid ${!erpLoaded ? COLORS.border : COLORS.gold}`, borderRadius: 12, padding: 20, marginBottom: 16, opacity: !erpLoaded ? 0.5 : 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div style={{ width: 28, height: 28, borderRadius: '50%', background: !erpLoaded ? COLORS.textLight : COLORS.gold, color: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 13 }}>2</div>
                        <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.text }}>Scan or Type Barcode</div>
                    </div>
                    {/* Last added flash */}
                    {lastAddedLabel && (
                        <div style={{ background: COLORS.successBg, border: `1px solid ${COLORS.success}`, color: COLORS.success, padding: '6px 14px', borderRadius: 20, fontSize: 12, fontWeight: 700, animation: 'none' }}>
                            {lastAddedLabel}
                        </div>
                    )}
                </div>

                {!cameraMode ? (
                    <div style={{ display: 'flex', gap: 10, alignItems: 'stretch' }}>
                        <input
                            ref={barcodeInputRef}
                            type="text" value={barcodeInput} onChange={e => setBarcodeInput(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter' && erpLoaded && barcodeInput.trim()) { scanBarcode(barcodeInput); } }}
                            placeholder={erpLoaded ? 'Point scanner gun here or type barcode → Enter' : 'Upload ERP Stock first (Step 1)'}
                            disabled={!erpLoaded}
                            style={{ flex: 1, padding: '14px 16px', border: `2px solid ${COLORS.gold}`, borderRadius: 8, fontSize: 15, fontFamily: 'monospace', outline: 'none', letterSpacing: 0.5, background: !erpLoaded ? COLORS.section : COLORS.bg }}
                            autoFocus={erpLoaded}
                        />
                        <button onClick={() => erpLoaded && barcodeInput.trim() && scanBarcode(barcodeInput)} disabled={!erpLoaded}
                            style={{ padding: '14px 24px', background: COLORS.primary, color: 'white', border: 'none', borderRadius: 8, cursor: erpLoaded ? 'pointer' : 'not-allowed', fontWeight: 700, fontSize: 14 }}>
                            Look Up
                        </button>
                        <button onClick={() => erpLoaded && setCameraMode(true)} disabled={!erpLoaded}
                            style={{ padding: '14px 18px', background: COLORS.sidebar, color: 'white', border: 'none', borderRadius: 8, cursor: erpLoaded ? 'pointer' : 'not-allowed', fontWeight: 600, fontSize: 13 }}>
                            📷
                        </button>
                        <button onClick={() => setShowManualEntry(!showManualEntry)}
                            style={{ padding: '14px 16px', background: showManualEntry ? COLORS.warning : COLORS.section, color: showManualEntry ? 'white' : COLORS.text, border: `1px solid ${COLORS.border}`, borderRadius: 8, cursor: 'pointer', fontWeight: 700, fontSize: 12, whiteSpace: 'nowrap' }}>
                            + Non-ERP
                        </button>
                    </div>
                ) : (
                    <div style={{ textAlign: 'center' }}>
                        <div id="qr-reader" style={{ width: '100%', maxWidth: 400, margin: '0 auto' }}></div>
                        <button onClick={() => setCameraMode(false)} style={{ marginTop: 12, padding: '10px 20px', background: COLORS.error, color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 600 }}>
                            Close Camera
                        </button>
                    </div>
                )}

                {/* Non-ERP Manual Entry Panel */}
                {showManualEntry && (
                    <div style={{ marginTop: 16, padding: 16, background: '#FFF8E7', border: `2px solid ${COLORS.warning}`, borderRadius: 10 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.warning, marginBottom: 12 }}>
                            ⚠ Non-ERP / Ghost Stock / Manual Entry
                            <span style={{ fontSize: 11, fontWeight: 400, color: COLORS.textMuted, marginLeft: 8 }}>Use for items not in ERP, damaged stock, non-barcode sarees, or any item that couldn't be scanned.</span>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr 1fr', gap: 10, marginBottom: 10 }}>
                            <div>
                                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>DESCRIPTION / BARCODE</div>
                                <input type="text" value={manualItem.desc} onChange={e => setManualItem({...manualItem, desc: e.target.value})}
                                    placeholder="e.g. Silk saree - no tag, or barcode"
                                    style={{ width: '100%', padding: '9px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 13 }} />
                            </div>
                            <div>
                                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>MRP (₹)</div>
                                <input type="number" value={manualItem.mrp} onChange={e => setManualItem({...manualItem, mrp: e.target.value})}
                                    placeholder="0"
                                    style={{ width: '100%', padding: '9px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 14, fontWeight: 600 }} />
                            </div>
                            <div>
                                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>QTY</div>
                                <input type="number" min="1" value={manualItem.qty} onChange={e => setManualItem({...manualItem, qty: parseInt(e.target.value)||1})}
                                    style={{ width: '100%', padding: '9px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 14, fontWeight: 700, textAlign: 'center' }} />
                            </div>
                            <div>
                                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>COLOUR TAG</div>
                                <select value={manualItem.tag} onChange={e => setManualItem({...manualItem, tag: e.target.value})}
                                    style={{ width: '100%', padding: '9px 10px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12 }}>
                                    {['WHITE','YELLOW','GREEN','ORANGE','BLUE','PINK','RED','UNTAGGED'].map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                            </div>
                            <div>
                                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>RACK</div>
                                <input type="text" value={manualItem.rack} onChange={e => setManualItem({...manualItem, rack: e.target.value})}
                                    placeholder="e.g. A3"
                                    style={{ width: '100%', padding: '9px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 13 }} />
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                            <div style={{ flex: 1 }}>
                                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>VENDOR / NOTES (optional)</div>
                                <input type="text" value={manualItem.vendor} onChange={e => setManualItem({...manualItem, vendor: e.target.value})}
                                    placeholder="Vendor name or notes about this item..."
                                    style={{ width: '100%', padding: '9px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 13 }} />
                            </div>
                            <button onClick={addManualItem} style={{ padding: '10px 24px', background: COLORS.warning, color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 800, fontSize: 14, whiteSpace: 'nowrap', alignSelf: 'flex-end' }}>
                                + Add Non-ERP
                            </button>
                        </div>
                    </div>
                )}
            </div>

            {/* STEP 3 — Item Details & Confirm (keyboard shortcut mode) */}
            {scanResult && (
                <div style={{ background: COLORS.card, borderRadius: 12, overflow: 'hidden', border: `2px solid ${scanResult.erpStatus === 'NOT PART OF ERP' ? COLORS.error : COLORS.success}`, marginBottom: 16 }}>
                    {/* ERP Status Banner */}
                    <div style={{ background: scanResult.erpStatus === 'NOT PART OF ERP' ? COLORS.error : COLORS.success, padding: '12px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                            <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgba(255,255,255,0.25)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 13 }}>3</div>
                            <div>
                                <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.8)', marginBottom: 2 }}>ERP STATUS</div>
                                <div style={{ fontSize: 18, fontWeight: 800, color: 'white', letterSpacing: 1 }}>
                                    {scanResult.erpStatus === 'NOT PART OF ERP' ? '✗ NOT IN ERP — GHOST STOCK' : '✓ FOUND IN ERP'}
                                </div>
                            </div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
                            <div style={{ textAlign: 'center', color: 'rgba(255,255,255,0.85)', background: 'rgba(0,0,0,0.15)', borderRadius: 8, padding: '6px 12px' }}>
                                <div style={{ fontSize: 9, marginBottom: 2 }}>ESC to dismiss</div>
                                <div style={{ fontSize: 10, fontWeight: 700 }}>↵ ENTER TAG KEY</div>
                            </div>
                            <div style={{ textAlign: 'right', color: 'white' }}>
                                <div style={{ fontSize: 10, opacity: 0.8, marginBottom: 2 }}>BARCODE</div>
                                <div style={{ fontSize: 14, fontWeight: 700, fontFamily: 'monospace' }}>{scanResult.barcode}</div>
                                <div style={{ fontSize: 10, opacity: 0.8, marginTop: 2 }}>Item #{scannedItems.length + 1}</div>
                            </div>
                        </div>
                    </div>

                    {/* Auto-filled data */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', background: COLORS.section, borderBottom: `1px solid ${COLORS.border}` }}>
                        {[
                            { label: 'MRP (ERP)', value: formatCurrency(scanResult.mrp), big: true, color: COLORS.primary },
                            { label: 'COST PRICE', value: formatCurrency(scanResult.cp), big: true, color: COLORS.text },
                            { label: 'VENDOR (ERP)', value: scanResult.vendorErp || '—', big: false, color: COLORS.text },
                            { label: 'VENDOR (QRD3)', value: scanResult.vendorQrd3 || '—', big: false, color: COLORS.text },
                        ].map((d, i) => (
                            <div key={i} style={{ padding: '12px 16px', borderRight: i < 3 ? `1px solid ${COLORS.border}` : 'none' }}>
                                <div style={{ fontSize: 9, fontWeight: 700, color: COLORS.textMuted, textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4 }}>{d.label}</div>
                                <div style={{ fontSize: d.big ? 20 : 13, fontWeight: 700, color: d.color, lineHeight: 1.2 }}>{d.value}</div>
                            </div>
                        ))}
                    </div>

                    {/* Keyboard tag selector + optional overrides */}
                    <div style={{ padding: '14px 20px', background: COLORS.card }}>
                        {/* Keyboard shortcut hint bar */}
                        <div style={{ background: COLORS.sidebar, borderRadius: 8, padding: '10px 16px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.gold, whiteSpace: 'nowrap' }}>⌨ PRESS KEY TO TAG &amp; ADD INSTANTLY:</div>
                            {Object.entries(TAG_SHORTCUT_LABELS).map(([tag, key]) => (
                                <div key={tag} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                                    <span style={{
                                        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                                        width: 24, height: 24, borderRadius: 5, fontWeight: 800, fontSize: 13,
                                        background: scanTag === tag ? COLORS.gold : 'rgba(255,255,255,0.15)', color: scanTag === tag ? '#000' : 'white',
                                        border: scanTag === tag ? `2px solid ${COLORS.gold}` : '1px solid rgba(255,255,255,0.2)',
                                        fontFamily: 'monospace', cursor: 'pointer',
                                    }} onClick={() => addScanItem() /* clicking key selects it visually */}>{key}</span>
                                    <span style={{ fontSize: 10, color: '#aaa' }}>{tag}</span>
                                </div>
                            ))}
                        </div>

                        {/* Colour Tag visual buttons (clickable too) + optional fields */}
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr auto auto auto', gap: 12, alignItems: 'end' }}>
                            <div>
                                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.textMuted, marginBottom: 8, textTransform: 'uppercase' }}>Click tag or press key above (W/Y/G/O/B/P/R/U)</div>
                                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                                    {['WHITE','YELLOW','GREEN','ORANGE','BLUE','PINK','RED','UNTAGGED'].map(t => (
                                        <button key={t} onClick={() => setScanTag(t)} style={{
                                            padding: '8px 14px', borderRadius: 7,
                                            border: scanTag === t ? `2px solid ${COLORS.primary}` : `1px solid ${COLORS.border}`,
                                            background: scanTag === t ? COLORS.primary : TAG_COLORS[t] || '#ccc',
                                            color: scanTag === t ? 'white' : (t === 'YELLOW' || t === 'WHITE' || t === 'UNTAGGED' ? '#333' : 'white'),
                                            cursor: 'pointer', fontSize: 11, fontWeight: 700,
                                            boxShadow: scanTag === t ? '0 2px 8px rgba(139,26,74,0.4)' : 'none',
                                        }}>
                                            <span style={{ fontFamily: 'monospace', fontSize: 9, opacity: 0.7, marginRight: 4 }}>[{TAG_SHORTCUT_LABELS[t]}]</span>{t}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* MRP Override */}
                            <div style={{ minWidth: 130 }}>
                                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.text, marginBottom: 6, textTransform: 'uppercase' }}>MRP Override</div>
                                <input type="number" value={scanMrpOverride} onChange={e => setScanMrpOverride(e.target.value)}
                                    placeholder={String(scanResult.mrp || '0')}
                                    style={{ width: '100%', padding: '10px 12px', border: `2px solid ${scanMrpOverride ? COLORS.warning : COLORS.border}`, borderRadius: 8, fontSize: 14, fontWeight: 600, background: scanMrpOverride ? COLORS.warningBg : COLORS.bg }} />
                                {scanMrpOverride && <div style={{ fontSize: 9, color: COLORS.warning, marginTop: 2 }}>⚠ Mismatch logged</div>}
                            </div>

                            {/* QTY */}
                            <div style={{ minWidth: 90 }}>
                                <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.text, marginBottom: 6, textTransform: 'uppercase' }}>Qty</div>
                                <input type="number" min="1" value={scanQty} onChange={e => setScanQty(parseInt(e.target.value)||1)}
                                    style={{ width: '100%', padding: '10px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 8, fontSize: 16, fontWeight: 700, textAlign: 'center' }} />
                            </div>

                            {/* Add Button (mouse fallback) */}
                            <button onClick={addScanItem} style={{
                                padding: '11px 22px', background: COLORS.primary, color: 'white', border: 'none', borderRadius: 8,
                                cursor: 'pointer', fontSize: 14, fontWeight: 800, whiteSpace: 'nowrap',
                                boxShadow: '0 4px 14px rgba(139,26,74,0.35)',
                            }}>
                                + ADD
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* LIVE AUDIT SUMMARY (auto-synced) */}
            {scannedItems.length > 0 && (
                <div style={{ background: COLORS.sidebar, borderRadius: 12, padding: '16px 20px', marginBottom: 16 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.gold, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>
                        ⚡ Live Audit Summary — Auto-Synced to Dashboard
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 12 }}>
                        {[
                            { label: 'Scanned (pcs)', value: formatNumber(totalScannedPcs), color: COLORS.gold },
                            { label: 'Unique SKUs', value: formatNumber(scannedItems.length), color: 'white' },
                            { label: 'ERP Match', value: matchPct + '%', color: parseFloat(matchPct) > 90 ? '#4ade80' : '#fb923c' },
                            { label: 'Non-ERP / Ghost', value: formatNumber(ghostCount), color: ghostCount > 0 ? '#fb923c' : '#4ade80' },
                            { label: 'Live Variance', value: (liveVariance > 0 ? '+' : '') + formatNumber(liveVariance) + ' (' + liveVariancePct + '%)', color: liveVariance > 0 ? '#4ade80' : '#f87171' },
                            { label: 'MRV Value', value: formatCurrency(totalMRV), color: COLORS.gold },
                        ].map((m, i) => (
                            <div key={i} style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: 10, color: '#888', fontWeight: 600, marginBottom: 4, textTransform: 'uppercase' }}>{m.label}</div>
                                <div style={{ fontSize: 18, fontWeight: 800, color: m.color }}>{m.value}</div>
                            </div>
                        ))}
                    </div>
                </div>
            )}

            {/* Scanned Items Table */}
            {scannedItems.length > 0 && (
                <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 12, overflow: 'hidden' }}>
                    <div style={{ padding: '14px 20px', borderBottom: `1px solid ${COLORS.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: COLORS.section }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text }}>
                            Scanned Items — {scannedItems.length} unique SKUs / {formatNumber(totalScannedPcs)} total pieces
                        </div>
                        <div style={{ display: 'flex', gap: 8 }}>
                            <button onClick={downloadScanData} style={{ padding: '7px 14px', background: COLORS.success, color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>
                                ⬇ Export Excel
                            </button>
                            <button onClick={() => {
                                if (!window.confirm('Clear ALL scanned items? This cannot be undone.')) return;
                                if (fbDb && sessionCode) {
                                    fbDb.ref(`mugdha-audit/sessions/${sessionCode}/items`).remove();
                                } else { setScannedItems([]); }
                            }} style={{ padding: '7px 14px', background: COLORS.error, color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>
                                ✕ Clear All
                            </button>
                        </div>
                    </div>
                    <div style={{ maxHeight: 380, overflowY: 'auto' }}>
                        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                            <thead style={{ position: 'sticky', top: 0, zIndex: 1 }}>
                                <tr style={{ background: COLORS.sidebar, color: 'white' }}>
                                    {['#','Barcode','Qty','Colour Tag','MRP','CP','ERP Status','Vendor','Rack'].map(h => (
                                        <th key={h} style={{ padding: '10px 12px', textAlign: 'left', fontWeight: 600, fontSize: 11, textTransform: 'uppercase', letterSpacing: 0.3, whiteSpace: 'nowrap' }}>{h}</th>
                                    ))}
                                    <th style={{ padding: '10px 12px' }}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {[...scannedItems].reverse().map((item, idx) => (
                                    <tr key={item.id} style={{ borderBottom: `1px solid ${COLORS.borderLight}`, background: idx % 2 === 0 ? COLORS.bg : COLORS.section }}>
                                        <td style={{ padding: '9px 12px', color: COLORS.textMuted, fontSize: 11 }}>{scannedItems.length - idx}</td>
                                        <td style={{ padding: '9px 12px', fontFamily: 'monospace', fontWeight: 600, color: COLORS.text, fontSize: 11 }}>{item.barcode}</td>
                                        <td style={{ padding: '9px 12px', fontWeight: 700, color: COLORS.primary }}>{item.qty}</td>
                                        <td style={{ padding: '9px 12px' }}>
                                            <span style={{ background: TAG_COLORS[item.tagType] || '#ccc', color: (item.tagType === 'WHITE' || item.tagType === 'YELLOW') ? '#333' : 'white', padding: '3px 8px', borderRadius: 4, fontSize: 10, fontWeight: 700 }}>{item.tagType}</span>
                                        </td>
                                        <td style={{ padding: '9px 12px', fontWeight: 600, color: COLORS.text }}>{formatCurrency(item.mrp)}</td>
                                        <td style={{ padding: '9px 12px', color: COLORS.textMuted }}>{formatCurrency(item.cp)}</td>
                                        <td style={{ padding: '9px 12px' }}>
                                            <span style={{ color: item.erpStatus === 'YES' ? COLORS.success : COLORS.error, fontWeight: 700, fontSize: 11 }}>
                                                {item.erpStatus === 'YES' ? '✓ ERP' : '✗ Ghost'}
                                            </span>
                                        </td>
                                        <td style={{ padding: '9px 12px', color: COLORS.textMuted, maxWidth: 120, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.vendorErp || '—'}</td>
                                        <td style={{ padding: '9px 12px', color: COLORS.textMuted }}>{item.rack || '—'}</td>
                                        <td style={{ padding: '9px 12px' }}>
                                            <button onClick={() => removeScannedItem(item.id)}
                                                style={{ padding: '3px 8px', background: 'none', border: `1px solid ${COLORS.error}`, color: COLORS.error, borderRadius: 4, cursor: 'pointer', fontSize: 11 }}>✕</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
        </div>
        );
    };

    const renderSchedule = () => (
        <div style={{ padding: 20 }}>
            <h1 style={{ fontSize: 28, fontWeight: 700, color: COLORS.text, marginBottom: 20 }}>Audit Schedule</h1>

            <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 20, marginBottom: 20 }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginBottom: 16 }}>Plan New Audit</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 16 }}>
                    <div>

            // ── Section 1: Executive Summary ──────────────────────────────────
            let y = 48;
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12); doc.setFont('helvetica', 'bold');
            doc.text('1. EXECUTIVE SUMMARY', ML, y); y += 8;

            const riskColor = calculations.riskRating === 'CRITICAL' ? [185,28,28] : calculations.riskRating === 'HIGH' ? [180,83,9] : calculations.riskRating === 'MEDIUM' ? [161,98,7] : [21,128,61];
            doc.autoTable({
                startY: y,
                margin: { left: ML, right: 14 },
                theme: 'grid',
                headStyles: { fillColor: maroon, textColor: 255, fontStyle: 'bold', fontSize: 9 },
                styles: { fontSize: 9, cellPadding: 3 },
                alternateRowStyles: { fillColor: [250, 248, 245] },
                head: [['Metric', 'Value', 'Metric', 'Value']],
                body: [
                    ['Physical Count', formatNumber(calculations.physicalCount), 'ERP Adjusted Expected', formatNumber(calculations.erpAdjusted)],
                    ['Variance (Pieces)', formatNumber(calculations.variance), 'Variance %', calculations.variancePercent.toFixed(2) + '%'],
                    ['ERP Matched', formatNumber(calculations.erpMatched), 'Ghost Stock (Not in ERP)', formatNumber(calculations.ghostStock)],
                    ['ERP Match Rate', calculations.matchRate.toFixed(2) + '%', 'Stock MRP Value', formatCurrency(calculations.mrvValue)],
                    ['Shrinkage (Pieces)', formatNumber(calculations.shrinkagePieces), 'Shrinkage %', calculations.shrinkageRate.toFixed(2) + '%'],
                    ['Shrinkage Value (MRP)', formatCurrency(shrinkageValueMRP), 'Shrinkage Value (CP)', formatCurrency(shrinkageValueCP)],
                    ['Risk Rating', calculations.riskRating, 'Industry Benchmark', '0.5% – 1.5%'],
                ],
            });
            y = doc.lastAutoTable.finalY + 10;

            // ── Section 2: Method 1 Reconciliation ───────────────────────────
            doc.setFontSize(12); doc.setFont('helvetica', 'bold');
            doc.text('2. METHOD 1 — ERP vs PHYSICAL RECONCILIATION', ML, y); y += 6;
            doc.autoTable({
                startY: y, margin: { left: ML, right: 14 }, theme: 'grid',
                headStyles: { fillColor: maroon, textColor: 255, fontStyle: 'bold', fontSize: 9 },
                styles: { fontSize: 9, cellPadding: 3 },
                alternateRowStyles: { fillColor: [250, 248, 245] },
                head: [['Line Item', 'Pieces']],
                body: [
                    ['Opening Stock (ERP)', formatNumber(calculations.erpOpening)],
                    ['(+) STN Inward', formatNumber(calculations.stnInQty)],
                    ['(–) STN Outward', formatNumber(calculations.stnOutQty)],
                    ['(+) Sales Returns', formatNumber(calculations.returnsQty)],
                    ['(–) Sales', formatNumber(calculations.salesQty)],
                    ['= ERP Adjusted Expected Stock', formatNumber(calculations.erpAdjusted)],
                    ['Physical Count (Scanned + Non-Barcode)', formatNumber(calculations.physicalCount)],
                    ['= VARIANCE', formatNumber(calculations.variance) + '  (' + calculations.variancePercent.toFixed(2) + '%)'],
                ],
                didParseCell: (data) => {
                    if (data.row.index === 5 || data.row.index === 7) {
                        data.cell.styles.fontStyle = 'bold';
                        data.cell.styles.fillColor = data.row.index === 7
                            ? (calculations.variance >= 0 ? [220, 252, 231] : [254, 226, 226])
                            : [240, 253, 244];
                    }
                }
            });
            y = doc.lastAutoTable.finalY + 10;

            // ── Section 3: Method 2 (if not first time) ───────────────────────
            if (!firstTimeAudit) {
                if (y > 240) { doc.addPage(); y = 20; }
                doc.setFontSize(12); doc.setFont('helvetica', 'bold');
                doc.text('3. METHOD 2 — LAST AUDIT RECONCILIATION', ML, y); y += 6;
                doc.autoTable({
                    startY: y, margin: { left: ML, right: 14 }, theme: 'grid',
                    headStyles: { fillColor: [70, 70, 70], textColor: 255, fontStyle: 'bold', fontSize: 9 },
                    styles: { fontSize: 9, cellPadding: 3 },
                    alternateRowStyles: { fillColor: [250, 248, 245] },
                    head: [['Line Item', 'Pieces']],
                    body: [
                        ['Last Audited Closing Stock', formatNumber(parseInt(lastAuditClosingStock) || 0)],
                        ['(+) STN Inward', formatNumber(calculations.stnInQty)],
                        ['(–) STN Outward', formatNumber(calculations.stnOutQty)],
                        ['(+) Sales Returns', formatNumber(calculations.returnsQty)],
                        ['(–) Sales', formatNumber(calculations.salesQty)],
                        ['= Expected Stock (Method 2)', formatNumber(calculations.expected2)],
                        ['Physical Count', formatNumber(calculations.physicalCount)],
                        ['= VARIANCE (Method 2)', formatNumber(calculations.variance2) + '  (' + calculations.variancePercent2.toFixed(2) + '%)'],
                    ],
                    didParseCell: (data) => {
                        if (data.row.index === 5 || data.row.index === 7) {
                            data.cell.styles.fontStyle = 'bold';
                        }
                    }
                });
                y = doc.lastAutoTable.finalY + 10;
            }

            // ── Section 4: Shrinkage Analysis ────────────────────────────────
            if (y > 220) { doc.addPage(); y = 20; }
            const secNum = firstTimeAudit ? 3 : 4;
            doc.setFontSize(12); doc.setFont('helvetica', 'bold');
            doc.text(`${secNum}. SHRINKAGE & RISK ANALYSIS`, ML, y); y += 6;

            doc.autoTable({
                startY: y, margin: { left: ML, right: 14 }, theme: 'grid',
                headStyles: { fillColor: maroon, textColor: 255, fontStyle: 'bold', fontSize: 9 },
                styles: { fontSize: 9, cellPadding: 3 },
                alternateRowStyles: { fillColor: [250, 248, 245] },
                head: [['Shrinkage Metric', 'Value', 'Benchmark / Note']],
                body: [
                    ['Shrinkage (Pieces)', formatNumber(calculations.shrinkagePieces), 'Physical < ERP Adjusted'],
                    ['Shrinkage Rate (%)', calculations.shrinkageRate.toFixed(2) + '%', 'Industry: 0.5% – 1.5%'],
                    ['Shrinkage Value at MRP', formatCurrency(shrinkageValueMRP), `Avg MRP: ${formatCurrency(avgMRP)}`],
                    ['Shrinkage Value at Cost', formatCurrency(shrinkageValueCP), `Avg CP: ${formatCurrency(avgCP)}`],
                    ['Risk Rating', calculations.riskRating, calculations.riskRating === 'CRITICAL' ? '>10%' : calculations.riskRating === 'HIGH' ? '5-10%' : calculations.riskRating === 'MEDIUM' ? '3-5%' : '<3%'],
                    ['Stock MRP Value (Physical)', formatCurrency(calculations.mrvValue), 'Sum of PHY QTY × MRP'],
                    ['Stock CP Value (Physical)', formatCurrency(calculations.cpValue), 'Sum of PHY QTY × CP'],
                ],
                didParseCell: (data) => {
                    if (data.row.index === 4 && data.column.index === 1) {
                        data.cell.styles.textColor = riskColor;
                        data.cell.styles.fontStyle = 'bold';
                    }
                }
            });
            y = doc.lastAutoTable.finalY + 10;

            // ── Section 5: Tag Distribution ───────────────────────────────────
            if (Object.keys(calculations.tagDistribution).length > 0) {
                if (y > 220) { doc.addPage(); y = 20; }
                doc.setFontSize(12); doc.setFont('helvetica', 'bold');
                doc.text(`${secNum + 1}. COLOUR TAG DISTRIBUTION`, ML, y); y += 6;
                const totalQty = calculations.physicalCount || 1;
                const tagRows = Object.entries(calculations.tagDistribution).map(([tag, d]) => [
                    tag, formatNumber(d.count), formatNumber(d.qty),
                    formatCurrency(d.mrvValue), ((d.qty / totalQty) * 100).toFixed(1) + '%'
                ]);
                doc.autoTable({
                    startY: y, margin: { left: ML, right: 14 }, theme: 'grid',
                    headStyles: { fillColor: maroon, textColor: 255, fontStyle: 'bold', fontSize: 9 },
                    styles: { fontSize: 9, cellPadding: 3 },
                    alternateRowStyles: { fillColor: [250, 248, 245] },
                    head: [['Tag Colour', 'Barcode Count', 'Physical Qty', 'MRP Value', '% of Total']],
                    body: tagRows,
                });
                y = doc.lastAutoTable.finalY + 10;
            }

            // ── Root Cause & Recommendations ──────────────────────────────────
            if (y > 230) { doc.addPage(); y = 20; }
            doc.setFontSize(12); doc.setFont('helvetica', 'bold');
            doc.text(`${secNum + 2}. ROOT CAUSE ANALYSIS & RECOMMENDATIONS`, ML, y); y += 7;
            doc.setFontSize(9); doc.setFont('helvetica', 'normal');
            const rootCauses = [
                '1. SYSTEM MIGRATION: Three sequential migrations (Legacy → Focus ERP → Mugdha POS) introduced data mapping gaps and inflated ERP opening stock figures. Variances are partly attributable to historical carryover — not current operations.',
                '2. CENTRALISATION TRANSITION (Dec 2025): Warehouse centralisation involved STN movements across outlets. Timing mismatches between physical dispatch and ERP recording create apparent discrepancies.',
                '3. GHOST STOCK: ' + formatNumber(calculations.ghostStock) + ' barcodes exist physically but are absent from ERP. These represent un-reconciled items from migration-era purchases.',
                '4. STAFF NOTE: Discrepancies are NOT attributed to store staff. Findings stem from systemic factors. Outlet teams have co-operated fully with the audit process.',
            ];
            rootCauses.forEach(line => {
                const wrapped = doc.splitTextToSize(line, MR - ML);
                doc.text(wrapped, ML, y);
                y += wrapped.length * 5 + 3;
            });

            // ── Footer on all pages ───────────────────────────────────────────
            const totalPages = doc.getNumberOfPages();
            for (let p = 1; p <= totalPages; p++) {
                doc.setPage(p);
                doc.setFillColor(...maroon);
                doc.rect(0, 286, W, 11, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(8);
                doc.text('MUGDHA ART STUDIO LLP | Internal Audit Department | CONFIDENTIAL', ML, 293);
                doc.text(`Page ${p} of ${totalPages}`, MR - 20, 293);
            }

            doc.save(`Audit_Report_${selectedOutlet}_${new Date().toISOString().slice(0,10)}.pdf`);
        } catch (err) {
            console.error(err);
            alert('PDF generation error: ' + err.message);
        }
    };

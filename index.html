                        <h2 style={{ fontSize: 20, fontWeight: 700, color: COLORS.primary, marginBottom: 4 }}>MUGDHA AUDIT SIGN-OFF FORM</h2>
                        <p style={{ fontSize: 12, color: COLORS.textMuted }}>Outlet: {stores.find(s => s.code === selectedOutlet)?.name || selectedOutlet}</p>
                        <p style={{ fontSize: 12, color: COLORS.textMuted }}>Audit Date: {auditStartDate} to {auditEndDate}</p>
                    </div>

                    <div style={{ display: 'grid', gap: 16, marginBottom: 20 }}>
                        <div>
                            <label style={{ fontSize: 11, fontWeight: 600, color: COLORS.text, display: 'block', marginBottom: 5 }}>Store Manager Name</label>
                            <input type="text" value={storeManagerName} onChange={(e) => setStoreManagerName(e.target.value)}
                                style={{ width: '100%', padding: '10px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 13 }} />
                        </div>
                        <div>
                            <label style={{ fontSize: 11, fontWeight: 600, color: COLORS.text, display: 'block', marginBottom: 5 }}>Audit Team Lead</label>
                            <select style={{ width: '100%', padding: '10px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 13 }}>
                                <option value="">Select team member</option>
                                {teamMembers.filter(m => m.active).map(m => <option key={m.id} value={m.name}>{m.name} - {m.role}</option>)}
                            </select>
                        </div>
                        <div>
                            <label style={{ fontSize: 11, fontWeight: 600, color: COLORS.text, display: 'block', marginBottom: 5 }}>Key Findings & Observations</label>
                            <textarea value={auditNotes} onChange={(e) => setAuditNotes(e.target.value)}
                                style={{ width: '100%', padding: '10px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 13, minHeight: 100, fontFamily: 'monospace' }} />
                        </div>
                    </div>

                    <div style={{ background: COLORS.section, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 16, marginBottom: 16 }}>
                        <h4 style={{ fontSize: 13, fontWeight: 700, color: COLORS.text, marginBottom: 12 }}>Audit Summary</h4>
                        <table style={{ width: '100%', fontSize: 12 }}>
                            <tbody>
                                <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                                    <td style={{ padding: 8, fontWeight: 600 }}>Physical Count:</td>
                                    <td style={{ padding: 8, textAlign: 'right' }}>{formatNumber(calculations.physicalCount)}</td>
                                </tr>
                                <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                                    <td style={{ padding: 8, fontWeight: 600 }}>ERP Adjusted:</td>
                                    <td style={{ padding: 8, textAlign: 'right' }}>{formatNumber(calculations.erpAdjusted)}</td>
                                </tr>
                                <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                                    <td style={{ padding: 8, fontWeight: 600 }}>Variance %:</td>
                                    <td style={{ padding: 8, textAlign: 'right' }}>{calculations.variancePercent.toFixed(2)}%</td>
                                </tr>
                                <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                                    <td style={{ padding: 8, fontWeight: 600 }}>Shrinkage %:</td>
                                    <td style={{ padding: 8, textAlign: 'right' }}>{calculations.shrinkageRate.toFixed(2)}%</td>
                                </tr>
                                <tr>
                                    <td style={{ padding: 8, fontWeight: 600 }}>Risk Rating:</td>
                                    <td style={{ padding: 8, textAlign: 'right', fontWeight: 700, color: calculations.riskRating === 'CRITICAL' ? COLORS.error : calculations.riskRating === 'HIGH' ? COLORS.warning : COLORS.success }}>
                                        {calculations.riskRating}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, marginBottom: 20 }}>
                        <div>
                            <div style={{ height: 60, border: `1px dashed ${COLORS.border}`, borderRadius: 6, marginBottom: 8 }}></div>
                            <p style={{ fontSize: 11, fontWeight: 600, color: COLORS.text }}>Store Manager Signature</p>
                            <p style={{ fontSize: 10, color: COLORS.textMuted }}>Date: _____________</p>
                        </div>
                        <div>
                            <div style={{ height: 60, border: `1px dashed ${COLORS.border}`, borderRadius: 6, marginBottom: 8 }}></div>
                            <p style={{ fontSize: 11, fontWeight: 600, color: COLORS.text }}>Audit Lead Signature</p>
                            <p style={{ fontSize: 10, color: COLORS.textMuted }}>Date: _____________</p>
                        </div>
                    </div>

                    <button onClick={() => window.print()} style={{ width: '100%', padding: '12px 16px', background: COLORS.primary, color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 14 }}>
                        🖨 Print Sign-Off Form
                    </button>
                </div>
            </div>
        </div>
    );

    const renderEmails = () => (
        <div style={{ padding: 20 }}>
            <h1 style={{ fontSize: 28, fontWeight: 700, color: COLORS.text, marginBottom: 20 }}>Email Drafts</h1>

            <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 20, marginBottom: 20 }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginBottom: 16 }}>Auto-Generated Email Templates</h3>
                <div style={{ display: 'grid', gap: 16 }}>
                    <div style={{ background: COLORS.section, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 16 }}>
                        <h4 style={{ fontSize: 13, fontWeight: 700, color: COLORS.text, marginBottom: 8 }}>Audit Initiation</h4>
                        <textarea readOnly value={`Dear Team,\n\nAudit for ${stores.find(s => s.code === selectedOutlet)?.name || selectedOutlet} is scheduled from ${auditStartDate} to ${auditEndDate}.\n\nAudit Team: ${auditTeam.join(', ') || 'TBD'}\nEstimated SKU Count: ${estimatedTotal}\n\nPlease ensure all data is ready.\n\nBest regards,\nAudit Hub`}
                            style={{ width: '100%', padding: '10px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, minHeight: 120, fontFamily: 'monospace', color: COLORS.text }} />
                        <button onClick={() => copyToClipboard(`Dear Team,\n\nAudit for ${stores.find(s => s.code === selectedOutlet)?.name || selectedOutlet} is scheduled from ${auditStartDate} to ${auditEndDate}.\n\nAudit Team: ${auditTeam.join(', ') || 'TBD'}\nEstimated SKU Count: ${estimatedTotal}\n\nPlease ensure all data is ready.\n\nBest regards,\nAudit Hub`)}
                            style={{ marginTop: 10, padding: '8px 16px', background: COLORS.primary, color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>
                            📋 Copy to Clipboard
                        </button>
                    </div>

                    <div style={{ background: COLORS.section, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 16 }}>
                        <h4 style={{ fontSize: 13, fontWeight: 700, color: COLORS.text, marginBottom: 8 }}>Audit Results</h4>
                        <textarea readOnly value={`Dear Management,\n\nAudit Results for ${stores.find(s => s.code === selectedOutlet)?.name || selectedOutlet}:\n\nPhysical Count: ${formatNumber(calculations.physicalCount)}\nERP Adjusted: ${formatNumber(calculations.erpAdjusted)}\nVariance: ${calculations.variancePercent.toFixed(2)}%\nShrinkage Rate: ${calculations.shrinkageRate.toFixed(2)}%\nRisk Rating: ${calculations.riskRating}\nMatch Rate: ${calculations.matchRate.toFixed(1)}%\n\nKey Observations:\n${auditNotes || 'No observations recorded'}\n\nBest regards,\nAudit Team`}
                            style={{ width: '100%', padding: '10px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, minHeight: 140, fontFamily: 'monospace', color: COLORS.text }} />
                        <button onClick={() => copyToClipboard(`Dear Management,\n\nAudit Results for ${stores.find(s => s.code === selectedOutlet)?.name || selectedOutlet}:\n\nPhysical Count: ${formatNumber(calculations.physicalCount)}\nERP Adjusted: ${formatNumber(calculations.erpAdjusted)}\nVariance: ${calculations.variancePercent.toFixed(2)}%\nShrinkage Rate: ${calculations.shrinkageRate.toFixed(2)}%\nRisk Rating: ${calculations.riskRating}\nMatch Rate: ${calculations.matchRate.toFixed(1)}%\n\nKey Observations:\n${auditNotes || 'No observations recorded'}\n\nBest regards,\nAudit Team`)}
                            style={{ marginTop: 10, padding: '8px 16px', background: COLORS.primary, color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>
                            📋 Copy to Clipboard
                        </button>
                    </div>
                </div>
            </div>
        </div>
    );

    const renderSettings = () => (
        <div style={{ padding: 20 }}>
            <h1 style={{ fontSize: 28, fontWeight: 700, color: COLORS.text, marginBottom: 20 }}>Settings</h1>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
                <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 20 }}>
                    <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginBottom: 16 }}>Manage Outlets</h3>
                    <div style={{ marginBottom: 16 }}>
                        <input type="text" value={newStoreForm.code} onChange={(e) => setNewStoreForm({...newStoreForm, code: e.target.value})}
                            placeholder="Code" style={{ width: '100%', padding: '8px 10px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, marginBottom: 8 }} />
                        <input type="text" value={newStoreForm.name} onChange={(e) => setNewStoreForm({...newStoreForm, name: e.target.value})}
                            placeholder="Name" style={{ width: '100%', padding: '8px 10px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, marginBottom: 8 }} />
                        <input type="text" value={newStoreForm.state} onChange={(e) => setNewStoreForm({...newStoreForm, state: e.target.value})}
                            placeholder="State" style={{ width: '100%', padding: '8px 10px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, marginBottom: 8 }} />
                        <input type="text" value={newStoreForm.city} onChange={(e) => setNewStoreForm({...newStoreForm, city: e.target.value})}
                            placeholder="City" style={{ width: '100%', padding: '8px 10px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, marginBottom: 8 }} />
                        <input type="text" value={newStoreForm.manager} onChange={(e) => setNewStoreForm({...newStoreForm, manager: e.target.value})}
                            placeholder="Manager" style={{ width: '100%', padding: '8px 10px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, marginBottom: 8 }} />
                        <button onClick={() => { setStores([...stores, {...newStoreForm, id: Math.max(...stores.map(s => s.id), 0) + 1, active: true}]); setNewStoreForm({ code: '', name: '', state: '', city: '', manager: '' }); }}
                            style={{ width: '100%', padding: '8px 12px', background: COLORS.primary, color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>
                            Add Outlet
                        </button>
                    </div>
                    <div style={{ maxHeight: 300, overflowY: 'auto' }}>
                        {stores.map(store => (
                            <div key={store.id} style={{ background: COLORS.section, padding: 8, borderRadius: 6, marginBottom: 8, fontSize: 11, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <div><strong>{store.name}</strong> ({store.city})</div>
                                <button onClick={() => setStores(stores.filter(s => s.id !== store.id))} style={{ padding: '3px 8px', background: COLORS.error, color: 'white', border: 'none', borderRadius: 3, cursor: 'pointer', fontSize: 10 }}>Delete</button>
                            </div>
                        ))}
                    </div>
                </div>

                <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 20 }}>
                    <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginBottom: 16 }}>Manage Team</h3>
                    <div style={{ marginBottom: 16 }}>
                        <input type="text" value={newMemberForm.name} onChange={(e) => setNewMemberForm({...newMemberForm, name: e.target.value})}
                            placeholder="Name" style={{ width: '100%', padding: '8px 10px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, marginBottom: 8 }} />
                        <input type="text" value={newMemberForm.role} onChange={(e) => setNewMemberForm({...newMemberForm, role: e.target.value})}
                            placeholder="Role" style={{ width: '100%', padding: '8px 10px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, marginBottom: 8 }} />
                        <input type="text" value={newMemberForm.phone} onChange={(e) => setNewMemberForm({...newMemberForm, phone: e.target.value})}
                            placeholder="Phone" style={{ width: '100%', padding: '8px 10px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, marginBottom: 8 }} />
                        <button onClick={() => { setTeamMembers([...teamMembers, {...newMemberForm, id: Math.max(...teamMembers.map(m => m.id), 0) + 1, active: true}]); setNewMemberForm({ name: '', role: '', phone: '' }); }}
                            style={{ width: '100%', padding: '8px 12px', background: COLORS.primary, color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>
                            Add Member
                        </button>
                    </div>
                    <div style={{ maxHeight: 300, overflowY: 'auto' }}>
                        {teamMembers.map(member => (
                            <div key={member.id} style={{ background: COLORS.section, padding: 8, borderRadius: 6, marginBottom: 8, fontSize: 11, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <div><strong>{member.name}</strong> - {member.role}</div>
                                <button onClick={() => setTeamMembers(teamMembers.filter(m => m.id !== member.id))} style={{ padding: '3px 8px', background: COLORS.error, color: 'white', border: 'none', borderRadius: 3, cursor: 'pointer', fontSize: 10 }}>Delete</button>
                            </div>
                        ))}
                    </div>
                </div>
            </div>

            {/* ─── FIREBASE LIVE SYNC ──────────────────────────────────── */}
            <div style={{ marginTop: 20, background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 20 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                    <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, margin: 0 }}>🔴 Live Sync — Firebase Realtime Database</h3>
                    <span style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '3px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700, background: fbStatus === 'live' ? COLORS.successBg : COLORS.section, color: fbStatusColor, border: `1px solid ${fbStatusColor}` }}>
                        <span style={{ width: 8, height: 8, borderRadius: '50%', background: fbStatusColor, display: 'inline-block' }}></span>
                        {fbStatusLabel}
                    </span>
                </div>
                <p style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.6 }}>
                    Connect a free Firebase project to enable real-time multi-device scanning. Staff scan on their phones → scans appear instantly on your admin dashboard.
                    <br />Get credentials from <strong>Firebase Console → Project Settings → Your apps → Config</strong> (use the <em>databaseURL</em> from the Realtime Database section).
                </p>

                {fbConfig ? (
                    <div style={{ background: COLORS.successBg, border: `1px solid ${COLORS.success}`, borderRadius: 8, padding: 14, marginBottom: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                            <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.success }}>✓ Firebase Configured</div>
                            <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 3 }}>Project: <strong>{fbConfig.projectId}</strong> | DB: <strong>{fbConfig.databaseURL}</strong></div>
                        </div>
                        <button onClick={() => { setFbConfig(null); setFbDb(null); setFbStatus('offline'); localStorage.removeItem('mugdha_fb_config'); }}
                            style={{ padding: '6px 14px', background: COLORS.error, color: 'white', border: 'none', borderRadius: 6, cursor: 'pointer', fontWeight: 600, fontSize: 11 }}>
                            Disconnect
                        </button>
                    </div>
                ) : null}

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
                    {[
                        { field: 'apiKey', label: 'API Key', placeholder: 'AIzaSy...' },
                        { field: 'authDomain', label: 'Auth Domain', placeholder: 'your-project.firebaseapp.com' },
                        { field: 'databaseURL', label: 'Database URL ★', placeholder: 'https://your-project-default-rtdb.firebaseio.com' },
                        { field: 'projectId', label: 'Project ID', placeholder: 'your-project-id' },
                    ].map(({ field, label, placeholder }) => (
                        <div key={field}>
                            <label style={{ fontSize: 11, fontWeight: 700, color: COLORS.text, display: 'block', marginBottom: 5 }}>{label}</label>
                            <input type={field === 'apiKey' ? 'password' : 'text'}
                                value={fbConfigForm[field]}
                                onChange={e => setFbConfigForm({ ...fbConfigForm, [field]: e.target.value })}
                                placeholder={placeholder}
                                style={{ width: '100%', padding: '9px 12px', border: `1px solid ${COLORS.border}`, borderRadius: 6, fontSize: 12, fontFamily: field === 'apiKey' ? 'monospace' : 'inherit' }} />
                        </div>
                    ))}
                </div>
                <button onClick={() => {
                    const cfg = { ...fbConfigForm };
                    if (!cfg.apiKey || !cfg.databaseURL || !cfg.projectId) { alert('Please fill in API Key, Database URL, and Project ID at minimum.'); return; }
                    setFbConfig(cfg);
                    localStorage.setItem('mugdha_fb_config', JSON.stringify(cfg));
                    setFbConfigForm({ apiKey: '', authDomain: '', databaseURL: '', projectId: '' });
                }} style={{ padding: '10px 28px', background: COLORS.primary, color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 700, fontSize: 14 }}>
                    Save &amp; Connect Firebase
                </button>
                <span style={{ marginLeft: 16, fontSize: 11, color: COLORS.textMuted }}>Credentials are saved locally in your browser only — never sent to any server.</span>
            </div>
        </div>
    );

    // Staff users: scanner-only view (no sidebar)
    if (!isAdmin) {
        return (
            <div style={{ minHeight: '100vh', background: COLORS.bg }}>
                {renderScanner()}
            </div>
        );
    }

    // Admin: full sidebar + all tabs
    const visibleNav = NAV_ITEMS;

    return (
        <div style={{ display: 'flex', minHeight: '100vh', background: COLORS.bg }}>
            {/* Sidebar */}
            <div style={{
                position: 'fixed', top: 0, left: 0, height: '100vh', zIndex: 200,
                width: sidebarOpen ? 240 : 0,
                overflow: 'hidden',
                background: COLORS.sidebar,
                transition: 'width 0.25s ease',
                display: 'flex', flexDirection: 'column',
            }}>
                <div style={{ width: 240, minWidth: 240, height: '100%', display: 'flex', flexDirection: 'column', padding: '20px 0' }}>
                    <div style={{ padding: '0 16px', marginBottom: 8 }}>
                        <div style={{ fontSize: 18, fontWeight: 800, color: COLORS.gold, letterSpacing: 2 }}>MUGDHA</div>
                        <div style={{ fontSize: 10, color: COLORS.textLight, letterSpacing: 0.5 }}>Audit Hub v8 — Admin</div>
                    </div>
                    {/* User badge */}
                    <div style={{ margin: '8px 16px 16px', padding: '8px 12px', background: 'rgba(201,168,76,0.12)', borderRadius: 8, border: '1px solid rgba(201,168,76,0.25)' }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.gold }}>👤 {currentUser?.name}</div>
                        <div style={{ fontSize: 10, color: '#888', marginTop: 2 }}>{currentUser?.display}</div>
                    </div>
                    <nav style={{ flex: 1, overflowY: 'auto' }}>
                        {visibleNav.map(item => (
                            <button key={item.id} onClick={() => setActiveTab(item.id)}
                                style={{
                                    width: '100%', padding: '11px 16px', border: 'none', cursor: 'pointer', textAlign: 'left',
                                    background: activeTab === item.id ? COLORS.sidebarActive : 'transparent',
                                    color: activeTab === item.id ? 'white' : COLORS.textLight,
                                    transition: 'all 0.2s',
                                    display: 'flex', alignItems: 'center', gap: 10, fontSize: 13, fontWeight: 500,
                                    borderLeft: activeTab === item.id ? `3px solid ${COLORS.gold}` : '3px solid transparent',
                                }}>
                                <div style={{
                                    width: 26, height: 26, borderRadius: '50%',
                                    background: activeTab === item.id ? COLORS.gold : COLORS.sidebarHover,
                                    color: activeTab === item.id ? COLORS.sidebar : COLORS.textLight,
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontSize: 9, fontWeight: 700
                                }}>{item.abbr}</div>
                                <span>{item.label}</span>
                            </button>
                        ))}
                    </nav>
                    {/* Logout at bottom */}
                    <div style={{ padding: '12px 16px', borderTop: '1px solid rgba(255,255,255,0.08)' }}>
                        <button onClick={onLogout} style={{ width: '100%', padding: '9px', background: 'rgba(185,28,28,0.15)', border: '1px solid rgba(185,28,28,0.3)', color: '#f87171', borderRadius: 8, cursor: 'pointer', fontWeight: 600, fontSize: 12 }}>
                            ⎋ Sign Out
                        </button>
                    </div>
                </div>
            </div>

            {/* Sidebar toggle */}
            <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{
                position: 'fixed', top: '50%', left: sidebarOpen ? 228 : 8,
                transform: 'translateY(-50%)', zIndex: 300,
                width: 24, height: 48, borderRadius: sidebarOpen ? '0 8px 8px 0' : '8px',
                background: COLORS.primary, color: 'white', border: 'none', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 14, fontWeight: 'bold', transition: 'left 0.25s ease',
                boxShadow: '2px 0 8px rgba(0,0,0,0.3)',
            }}>
                {sidebarOpen ? '‹' : '›'}
            </button>

            {/* Main content */}
            <div style={{ marginLeft: sidebarOpen ? 240 : 0, transition: 'margin-left 0.25s ease', flex: 1, minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                <div style={{ flex: 1, overflowY: 'auto' }}>
                    {activeTab === 'dashboard' && renderDashboard()}
                    {activeTab === 'scanner' && renderScanner()}
                    {activeTab === 'schedule' && renderSchedule()}
                    {activeTab === 'upload' && renderUpload()}
                    {activeTab === 'progress' && renderProgress()}
                    {activeTab === 'analysis' && renderAnalysis()}
                    {activeTab === 'shrinkage' && renderShrinkage()}
                    {activeTab === 'reports' && renderReports()}
                    {activeTab === 'signoff' && renderSignOff()}
                    {activeTab === 'emails' && renderEmails()}
                    {activeTab === 'settings' && renderSettings()}
                </div>
            </div>
        </div>
    );
}

// ─── ROOT APP WITH AUTH ───────────────────────────────────────────────────────
function App() {
    const [currentUser, setCurrentUser] = useState(null);
    if (!currentUser) return <LoginScreen onLogin={setCurrentUser} />;
    return <MugdhaAuditHub currentUser={currentUser} onLogout={() => setCurrentUser(null)} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
